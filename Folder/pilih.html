<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 5px; font-family: 'Segoe UI', Arial, sans-serif; background: transparent; }
        
        /* DROPDOWN BERTINGKAT STYLE */
        .dropdown-induk { width: 310px; background-color: #ffffff; border: 2px solid #000000; border-radius: 6px; overflow: hidden; box-shadow: 3px 3px 0px #000; }
        .dropdown-induk summary { padding: 10px; font-weight: bold; background-color: #eaeaea; list-style: none; cursor: pointer; }
        .dropdown-induk summary::-webkit-details-marker { display: none; }
        
        .dropdown-anak { border-top: 1px solid #ddd; background-color: #fafafa; }
        .level-2 > summary { padding: 10px 10px 10px 20px; font-weight: bold; }
        .level-3 > summary { padding: 8px 10px 8px 35px; background-color: #f0f0f0; font-size: 14px; }
        
        .list-akhir { list-style: none; padding: 0; margin: 0; background-color: #ffffff; }
        .level-2 .list-akhir li { padding: 8px 10px 8px 30px; }
        .level-3 .list-akhir li { padding: 8px 10px 8px 50px; background-color: #fbfbfb; }
        
        .list-akhir li { border-top: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #333; }
        .list-akhir li:hover { background-color: #ecf5ff; color: #409eff; }
        
        /* RADIO BUTTON KUSTOM */
        .list-akhir input[type="radio"] { display: none; }
        .list-akhir li::after { content: ''; width: 10px; height: 10px; border: 1px solid #666; border-radius: 50%; display: inline-block; }
        .list-akhir li.terpilih { background-color: #ecf5ff !important; font-weight: bold; color: #409eff; }
        .list-akhir li.terpilih::after { background-color: #409eff; border-color: #409eff; }
    </style>
</head>
<body>

    <details class="dropdown-induk" open>
        <summary>Pilih Rumus / Kategori</summary>
        
        <!-- LEVEL 2: SUDUT -->
        <details class="dropdown-anak level-2">
            <summary>📁 -- sudut --</summary>
            
            <ul class="list-akhir">
                <li onclick="kirimKeKalkulatorUtama('Sudut: sin', 'sin', event)">
                    <span>sin</span><input type="radio" name="pilihan_rumus">
                </li>
                <li onclick="kirimKeKalkulatorUtama('Sudut: cos', 'cos', event)">
                    <span>cos</span><input type="radio" name="pilihan_rumus">
                </li>
            </ul>

            <!-- LEVEL 3: ALGORITMA DI DALAM SUDUT -->
            <details class="dropdown-anak level-3">
                <summary>📁 -- algoritma --</summary>
                <ul class="list-akhir">
                    <li onclick="kirimKeKalkulatorUtama('Algoritma: Faktorial', 'faktorial', event)">
                        <span>Faktorial (!)</span><input type="radio" name="pilihan_rumus">
                    </li>
                    <li onclick="kirimKeKalkulatorUtama('Algoritma: FPB', 'fpb', event)">
                        <span>FPB</span><input type="radio" name="pilihan_rumus">
                    </li>
                </ul>
            </details>
        </details>
    </details>

    <script>
        function kirimKeKalkulatorUtama(namaMenu, kodeOperasi, event) {
            event.stopPropagation();
            
            // 1. Atur efek visual radio terpilih di dalam iframe ini
            document.querySelectorAll('.list-akhir li').forEach(li => li.classList.remove('terpilih'));
            event.currentTarget.classList.add('terpilih');
            event.currentTarget.querySelector('input[type="radio"]').checked = true;

            // 2. KUNCI SINKRONISASI SEBERANG FOLDER:
            // Menggunakan 'window.parent' untuk menembus keluar folder dan mengontrol index.html
            if (window.parent && typeof window.parent.terimaDataDariFolder === 'function') {
                window.parent.terimaDataDariFolder(namaMenu, kodeOperasi);
            }
        }
    </script>
</body>
</html>
