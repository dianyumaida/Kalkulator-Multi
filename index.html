<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Simpel Tanpa JS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: #f5f5f5;
        }

        /* 1. KOTAK UTAMA (Bisa diklik untuk buka/tutup) */
        details {
            width: 300px;
            background-color: #ffffff;
            border: 2px solid #333333;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
        }

        /* 2. TAMPILAN AWAL SEBELUM DIKLIK */
        summary {
            padding: 15px;
            font-weight: bold;
            background-color: #eaeaea;
            list-style: none; /* Menghilangkan panah bawaan browser */
            display: flex;
            justify-content: space-between;
        }

        /* 3. DESAIN BARIS PILIHAN DI DALAMNYA */
        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-top: 1px solid #cccccc;
            cursor: pointer;
        }

        label:hover {
            background-color: #f9f9f9;
        }

        /* 4. KUNCI: Membuat sub-menu (a1, b1) menjorok ke kanan */
        .sub-menu {
            padding-left: 45px;
            background-color: #fafafa;
        }
    </style>
</head>
<body>

    <!-- Tag 'details' otomatis mengatur buka-tutup saat diklik -->
    <details>
        <!-- Tampilan utama kotak sebelum diklik -->
        <summary>
            <span>-- Pilih --</span>
            <span>▼</span>
        </summary>

        <!-- Daftar Pilihan Menu di Dalam Kotak (Menggunakan Input Radio Asli) -->
        <label>
            <span>a0</span>
            <input type="radio" name="pilihan_menu" value="a0">
        </label>

        <label class="sub-menu">
            <span>a1</span>
            <input type="radio" name="pilihan_menu" value="a1">
        </label>

        <label class="sub-menu">
            <span>b1</span>
            <input type="radio" name="pilihan_menu" value="ab1">
        </label>

        <label>
            <span>b0</span>
            <input type="radio" name="pilihan_menu" value="b0">
        </label>

        <label class="sub-menu">
            <span>b1</span>
            <input type="radio" name="pilihan_menu" value="bb1">
        </label>
    </details>

</body>
</html>
