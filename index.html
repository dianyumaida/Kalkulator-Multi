<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kurs Mata Uang</title>
    <style>
        body { Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding-top: 50px; }
        .container { background-color: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; }
        .input-group { 15px; }
        label { display: block; 5px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #result { 20px; font-size: 20px; text-align: center; font-weight: bold; color: #333; }
    </style>
</head>
<body>
 
<div class="container">
    <h2>Konverter Mata Uang</h2>
    <div class="input-group">
        <label for="amount">Jumlah:</label>
        <input type="number" id="amount" value="1">
    </div>
    <div class="input-group">
        <label for="from">Dari:</label>
        <select id="from">
            <option value="IDR">IDR (Rupiah Indonesia)</option>
            <option value="USD" selected>USD (Dolar AS)</option>
            <option value="EUR">EUR (Euro)</option>
            <option value="SGD">SGD (Dolar Singapura)</option>
            <option value="MYR">MYR (Ringgit Malaysia)</option>
        </select>
    </div>
    <div class="input-group">
        <label for="to">Ke:</label>
        <select id="to">
            <option value="IDR" selected>IDR (Rupiah Indonesia)</option>
            <option value="USD">USD (Dolar AS)</option>
            <option value="EUR">EUR (Euro)</option>
            <option value="SGD">SGD (Dolar Singapura)</option>
            <option value="MYR">MYR (Ringgit Malaysia)</option>
        </select>
    </div>
    <button onclick="convertCurrency()">Hitung Konversi</button>
    <div id="result">Hasil: -</div>
</div>
 
<script>
    async function convertCurrency() {
        const amount = document.getElementById('amount').value;
        const fromCurrency = document.getElementById('from').value;
        const toCurrency = document.getElementById('to').value;
        const resultDiv = document.getElementById('result');
 
        if (amount <= 0) {
            alert('Masukkan jumlah uang yang valid');
            return;
        }
 
        try {
            // Mengambil data kurs dari API publik Frankfurter
            const response = await fetch(`https://frankfurter.dev{fromCurrency}/${toCurrency}`);
            const data = await response.json();
 
            if (data.rate) {
                const convertedAmount = amount * data.rate;
                resultDiv.innerHTML = `${amount} ${fromCurrency} = <br><span style="color:#007bff">${convertedAmount.toFixed(2)} ${toCurrency}</span>`;
            } else {
                resultDiv.innerHTML = 'Kurs tidak ditemukan.';
            }
        } catch (error) {
            console.error('Error:', error);
            resultDiv.innerHTML = 'Gagal memuat data API.';
        }
    }
</script>
 
</body>
</html>
