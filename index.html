<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Layar Jernih & Tombol Pilih</title>
    <!-- Library SheetJS untuk Export Excel -->
    <script src="https://jsdelivr.net"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f3f4f6;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* Pembungkus Kalkulator Sesuai Desain Gambar Sketsa */
        .kalkulator-container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border: 3px solid #000000;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* 1. LAYER JERNIH (Tampilan Atas) */
        .layer-jernih {
            width: 100%;
            min-height: 140px;
            background: #fafafa;
            border: 2px solid #000000;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .info-rumus-awal {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #555555;
            line-height: 1.3;
            border-bottom: 1px dashed #cccccc;
            padding-bottom: 6px;
            margin-bottom: 6px;
            white-space: pre-wrap;
        }
        .status-input-aktif {
            font-size: 13px;
            color: #0284c7;
            font-weight: bold;
        }
        .angka-display-utama {
            font-size: 38px;
            font-weight: bold;
            color: #000000;
            text-align: right;
        }

        /* 2. KEYBOARD DUA BARIS + DELET (Sesuai Sketsa Gambar) */
        .papan-keyboard-sketsa {
            display: grid;
            grid-template-columns: repeat(5, 1fr) 2fr; /* 5 kolom angka, 1 kolom lebar untuk DELET */
            border: 2px solid #000000;
            background: #000000;
            gap: 2px; /* Membuat garis pembatas antar tombol hitam tebal */
            margin-bottom: 15px;
            overflow: hidden;
            border-radius: 4px;
        }
        .key-btn {
            background: #ffffff;
            border: none;
            padding: 16px 0;
            font-size: 20px;
            font-weight: bold;
            color: #000000;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .key-btn:active {
            background: #e5e7eb;
        }
        /* Tombol DELET memanjang vertikal di sebelah kanan */
        .key-delet {
            grid-column: 6;
            grid-row: 1 / span 2;
            background: #ffffff;
            color: #dc2626;
            font-size: 16px;
            letter-spacing: 1px;
        }
        .key-delet:active {
            background: #fca5a5;
        }

        /* 3. TOMBOL TUNGGAL "PILIH ▼" (Paling Bawah Keyboard) */
        .tombol-pilih-dropdown {
            width: 100%;
            padding: 15px;
            background: #ffffff;
            border: 2px solid #000000;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #000000;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tombol-pilih-dropdown:hover {
            background: #f9fafb;
        }

        /* 4. ISI KOTAK PILIHAN YANG SINKRON DAN TERSEMBUNYI */
        .kotak-pilihan-isi {
            display: none; /* Tersembunyi, terbuka jika PILIH diklik */
            margin-top: 15px;
            border: 2px dashed #000000;
            border-radius: 6px;
            padding: 12px;
            background: #f9fafb;
            max-height: 280px;
            overflow-y: auto;
        }
        .judul-kategori {
            font-weight: bold;
            font-size: 14px;
            color: #1f2937;
            margin-top: 10px;
            margin-bottom: 4px;
            display: block;
            border-bottom: 1px solid #000000;
        }
        .sub-data-wrapper {
            margin-left: 12px;
            margin-bottom: 8px;
        }
        .sub-data-title {
            font-size: 13px;
            color: #4b5563;
            font-style: italic;
        }
        /* Baris khusus nilai yang hanya memiliki radio button */
        .baris-nilai-radio {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            padding: 8px 12px;
            margin-top: 3px;
            border-radius: 4px;
        }
        .baris-nilai-radio label {
            font-size: 13px;
            color: #000000;
            cursor: pointer;
            flex: 1;
        }
        .baris-nilai-radio input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Tabel Rekaman Excel di dalam Kotak Pilihan */
        .tabel-riwayat-excel {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 11px;
        }
        .tabel-riwayat-excel th, .tabel-riwayat-excel td {
            border: 1px solid #000000;
            padding: 5px;
            text-align: left;
        }
        .btn-download-excel {
            width: 100%;
            padding: 8px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="kalkulator-container">
    
    <!-- 1. LAYER JERNIH DISPLAY -->
    <div class="layer-jernih">
        <!-- Visual Rumus Gambar 1 Tetap Sinkron Merayap -->
        <div class="info-rumus-awal">Rumus: log₁₀[ ((a/b)*(c+π)) / (∑cⁿ + ((a/b)-(c/d))/g_₍a₎) ] + [ ((g/a)+1%)/B ] * (∬dA)ⁿ</div>
        <div class="status-input-aktif" id="indikatorFokus">Edit Aktif: Variabel a = 10</div>
        <div class="angka-display-utama" id="angkaLayar">0.00</div>
    </div>

    <!-- 2. KEYBOARD BARIS SESUAI SKETSA GAMBAR ANDA -->
    <div class="papan-keyboard-sketsa">
        <!-- Baris 1 Angka -->
        <button class="key-btn" onclick="inputTombolAngka('1')">1</button>
        <button class="key-btn" onclick="inputTombolAngka('2')">2</button>
        <button class="key-btn" onclick="inputTombolAngka('3')">3</button>
        <button class="key-btn" onclick="inputTombolAngka('4')">4</button>
        <button class="key-btn" onclick="inputTombolAngka('5')">5</button>
        
        <!-- Tombol DELET di Sisi Kanan Vertikal Penuh -->
        <button class="key-btn key-delet" onclick="aksiHapusTombol('DELET')">DELET</button>
        
        <!-- Baris 2 Angka -->
        <button class="key-btn" onclick="inputTombolAngka('6')">6</button>
        <button class="key-btn" onclick="inputTombolAngka('7')">7</button>
        <button class="key-btn" onclick="inputTombolAngka('8')">8</button>
        <button class="key-btn" onclick="inputTombolAngka('9')">9</button>
        <button class="key-btn" onclick="inputTombolAngka('0')">0</button>
    </div>

    <!-- 3. TOMBOL TUNGGAL PILIH (Paling Bawah) -->
    <button class="tombol-pilih-dropdown" onclick="kendaliBukaTutupKotakPilih()">
        <span>PILIH</span>
        <span id="ikonPanahStatus">▼</span>
    </button>

    <!-- 4. ISI KOTAK PILIHAN (Sinkron Berstruktur Tingkat) -->
    <div id="kotakPilihanData" class="kotak-pilihan-isi">
        
        <!-- Tingkat 1: LOG -->
        <span class="judul-kategori">■ Kategori a0 (Log)</span>
        <div class="sub-data-wrapper">
            <span class="sub-data-title">▶ Data Log Aljabar</span>
            <!-- Tingkat Akhir: Nilai yang memiliki Radio Button -->
            <div class="baris-nilai-radio">
                <label for="rad_log1">Nilai Log Primer (a: 15, b: 3)</label>
                <input type="radio" name="grup_sketsa" id="rad_log1" onclick="jalankanRadioSinkron('Log Primer', 15, 3)">
            </div>
            <div class="baris-nilai-radio">
                <label for="rad_log2">Nilai Log Sekunder (a: 30, b: 5)</label>
                <input type="radio" name="grup_sketsa" id="rad_log2" onclick="jalankanRadioSinkron('Log Sekunder', 30, 5)">
            </div>
        </div>

        <!-- Tingkat 2: KONSTANTA -->
        <span class="judul-kategori">■ Kategori b0 (Konstanta)</span>
        <div class="sub-data-wrapper">
            <span class="sub-data-title">▶ Data Konstanta g(a)</span>
            <div class="baris-nilai-radio">
                <label for="rad_konst1">Nilai Konstanta Utama (a: 8, b: 2)</label>
                <input type="radio" name="grup_sketsa" id="rad_konst1" onclick="jalankanRadioSinkron('Konstanta Utama', 8, 2)">
            </div>
        </div>

        <!-- Tingkat 3: SUDUT -->
        <span class="judul-kategori">■ Kategori c0 (Sudut)</span>
        <div class="sub-data-wrapper">
            <span class="sub-data-title">▶ Data Sudut Sisi</span>
            <div class="baris-nilai-radio">
                <label for="rad_sudut1">Nilai Sudut Derajat (a: 12, b: 4)</label>
                <input type="radio" name="grup_sketsa" id="rad_sudut1" onclick="jalankanRadioSinkron('Sudut Derajat', 12, 4)">
            </div>
        </div>
