<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Utama</title>
    <!-- Masukkan style Brutalisme Kalkulator Anda di sini -->
    <style>
        /* ... Style kalkulator dan grid angka Anda ... */
        
        .panel-kiri {
            background-color: #e2ede2;
            border: 2px solid #000000;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }
        .field-tampilan {
            background-color: #ffffff;
            border: 1px solid #000000;
            border-radius: 5px;
            height: 32px;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-size: 13px;
            color: #333;
            font-weight: bold;
        }

        /* CONTAINER IFRAME UNTUK POPUP MENU */
        .iframe-wrapper {
            position: absolute;
            left: -10px;
            top: 140px; /* Atur posisi munculnya tepat di bawah tombol pilih */
            width: 340px;
            height: 300px;
            z-index: 100;
            display: none; /* Sembunyi secara default */
            border: none;
        }
        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .btn-pilih {
            background-color: #ffffff;
            border: 1px solid #c96f6f;
            color: #bd2a2a;
            font-weight: bold;
            font-size: 14px;
            padding: 6px 0;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            user-select: none;
        }
    </style>
</head>
<body>

    <!-- KOTAK KALKULATOR ANDA -->
    <!-- (Bagian Layar Display dan Tombol Angka tetap seperti sebelumnya) -->

    <div class="panel-kiri">
        <div class="field-tampilan" id="fieldMenu">- Menu -</div>
        <div class="field-tampilan" id="fieldVal1">Input 1</div>
        <div class="field-tampilan" id="fieldVal2">Input 2</div>
        
        <!-- Tombol Pilih Utama -->
        <div class="btn-pilih" onclick="toggleMenuFolder()">&lt; PILIH &gt;</div>

        <!-- BINGKAI LAYAR VIRTUAL UNTUK MEMANGGIL FILE DI DALAM FOLDER -->
        <div class="iframe-wrapper" id="containerMenu">
            <!-- Sesuaikan "Folder/pilih.html" dengan nama folder asli Anda di komputer -->
            <iframe src="Folder/pilih.html" id="layarMenu"></iframe>
        </div>
    </div>

    <script>
        const containerMenu = document.getElementById('containerMenu');
        const fieldMenu = document.getElementById('fieldMenu');
        const layarHasil = document.getElementById('layarHasil');
        const indikatorMerah = document.getElementById('indikatorMerah');
        
        let menuAktif = '';

        // Fungsi membuka & menutup menu dari dalam folder
        function toggleMenuFolder() {
            if (containerMenu.style.display === "block") {
                containerMenu.style.display = "none";
            } else {
                containerMenu.style.display = "block";
            }
        }

        /* =======================================================
           FUNGSI SINKRONISASI GLOBAL (DIPANGGIL OLEH FILE DI DALAM FOLDER)
           ======================================================= */
        window.terimaDataDariFolder = function(namaMenu, kodeOperasi) {
            // 1. Ubah teks menu di kalkulator utama
            fieldMenu.innerText = namaMenu;
            if(indikatorMerah) indikatorMerah.innerText = kodeOperasi.toUpperCase();
            
            // 2. Set variabel rumus yang aktif ke mesin hitung
            menuAktif = kodeOperasi;
            
            // 3. Tutup otomatis pop-up iframe menu
            containerMenu.style.display = "none";
            
            // 4. Reset angka input kalkulator setiap ganti rumus
            if(typeof inputSkor !== 'undefined') inputSkor = '';
            console.log("Kalkulator Utama Sinkron! Rumus Aktif: " + menuAktif);
        };
    </script>
</body>
</html>
