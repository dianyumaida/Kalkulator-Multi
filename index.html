<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Berstruktur Panel Pilih</title>
    <!-- Library SheetJS untuk Export Excel -->
    <script src="https://jsdelivr.net"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f4f4f9;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        
        /* KOMPONEN KOTAK PILIH UTAMA */
        .kotak-pilih {
            border: 2px solid #333;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
            background: #fff;
        }
        .header-pilih {
            background: #333;
            color: #fff;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .konten-pilih {
            padding: 10px;
            background: #fafafa;
        }
        
        /* STRUKTUR AKORDION / PANAH NAIK TURUN */
        .grup-kategori {
            margin-bottom: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #fff;
        }
        .tombol-kategori {
            width: 100%;
            padding: 12px;
            background: #edf2f7;
            border: none;
            text-align: left;
            font-weight: bold;
            font-size: 15px;
            color: #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            outline: none;
        }
        .tombol-kategori:hover { background: #e2e8f0; }
        .sub-menu {
            display: none; /* Sembunyi secara default, terbuka saat diklik */
            padding: 10px;
            background: #fff;
            border-top: 1px solid #cbd5e1;
        }
        
        /* BARIS RADIO BUTTON */
        .baris-data {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #f8fafc;
            margin-bottom: 5px;
            border-radius: 4px;
            border-left: 4px solid #cbd5e1;
        }
        .baris-data.terpilih { border-left-color: #ffc107; background: #fffdeb; }
        .baris-data label { cursor: pointer; flex: 1; font-size: 14px; color: #334155; }
        .baris-data input[type="radio"] { width: 18px; height: 18px; cursor: pointer; }

        /* INPUT DAN TOMBOL AUTO BESAR */
        .grid-kalkulator {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .grup-input {
            display: flex;
            flex-direction: column;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 6px;
        }
        .grup-input label { font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #475569; }
        .wrapper-input { display: flex; gap: 4px; }
        .wrapper-input input { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 15px; }
        .btn-inf { padding: 0 12px; background: #cbd5e1; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* TOMBOL AKSI */
        .btn-hitung { width: 100%; padding: 15px; background: #ffc107; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-excel { width: 100%; padding: 12px; background: #217346; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
        
        /* TABEL RIWAYAT DI DALAM KOTAK */
        .box-riwayat { max-height: 200px; overflow-y: auto; border: 1px solid #cbd5e1; border-radius: 4px; background: #fff; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; border: 1px solid #e2e8f0; text-align: left; font-size: 13px; }
        th { background: #f1f5f9; position: sticky; top: 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator Sistem Panel Navigasi</h2>

    <!-- KOTAK PILIH UTAMA -->
    <div class="kotak-pilih">
        <div class="header-pilih" onclick="toggleElemen('kontenUtama')">
            <span>PILIH PARAMETER DATA & RIWAYAT</span>
            <span id="panahUtama">▼</span>
        </div>
        
        <div id="kontenUtama" class="konten-pilih">
            
            <!-- KATEGORI A0: LOG & DATA RUMUS -->
            <div class="grup-kategori">
                <button class="tombol-kategori" onclick="toggleElemen('subA0')">
                    <span>a0 (Log / Data Rumus)</span>
                    <span>▼</span>
                </button>
                <div id="subA0" class="sub-menu">
                    <div class="baris-data">
                        <label for="r_a1">a1 (Data Log Utama - Nilai: 15)</label>
                        <input type="radio" name="opsi_data" id="r_a1" onclick="pilihData('a1', 15, 3, 'Log')">
                    </div>
                    <div class="baris-data">
                        <label for="r_a2">a2 (Data Log Sekunder - Nilai: 25)</label>
                        <input type="radio" name="opsi_data" id="r_a2" onclick="pilihData('a2', 25, 5, 'Log')">
                    </div>
                </div>
            </div>

            <!-- KATEGORI B0: KONSTANTA -->
            <div class="grup-kategori">
                <button class="tombol-kategori" onclick="toggleElemen('subB0')">
                    <span>b0 (Konstanta)</span>
                    <span>▼</span>
                </button>
                <div id="subB0" class="sub-menu">
                    <div class="baris-data">
                        <label for="r_b1">b1 (Konstanta Statis - Nilai: 8)</label>
                        <input type="radio" name="opsi_data" id="r_b1" onclick="pilihData('b1', 8, 2, 'Konstanta')">
                    </div>
                </div>
            </div>

            <!-- KATEGORI C0: SUDUT -->
            <div class="grup-kategori">
                <button class="tombol-kategori" onclick="toggleElemen('subC0')">
                    <span>c0 (Sudut)</span>
                    <span>▼</span>
                </button>
                <div id="subC0" class="sub-menu">
                    <div class="baris-data">
                        <label for="r_c1">c1 (Sudut Lancip - Nilai: 12)</label>
                        <input type="radio" name="opsi_data" id="r_c1" onclick="pilihData('c1', 12, 4, 'Sudut')">
                    </div>
                </div>
            </div>

            <!-- KATEGORI RIWAYAT (Ada di dalam kotak pilih) -->
            <div class="grup-kategori">
                <button class="tombol-kategori" onclick="toggleElemen('subRiwayat')" style="background: #e2e8f0;">
                    <span>📜 Riwayat Perhitungan Masuk Excel</span>
                    <span>▼</span>
                </button>
                <div id="subRiwayat" class="sub-menu">
                    <div class="box-riwayat">
                        <table>
                            <thead>
                                <tr><th>Waktu</th><th>Nama</th><th>Hasil</th></tr>
                            </thead>
                            <tbody id="bodyTabelExcel">
                                <tr><td colspan="3" style="text-align:center; color:#999;">Belum ada log data terpilih</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <button class="btn-excel" onclick="unduhBerkasExcel()">📥 UNDUH KE EXCEL (.XLSX)</button>
                </div>
            </div>

        </div>
    </div>

    <!-- MONITOR PARAMETER INPUT (Lebar otomatis/Responsive) -->
    <div class="grid-kalkulator">
        <div class="grup-input"><label>Variabel a</label><div class="wrapper-input"><input type="text" id="v_a" value="10"><button class="btn-inf" onclick="setInf('v_a')">∞</button></div></div>
        <div class="grup-input"><label>Variabel b</label><div class="wrapper-input"><input type="text" id="v_b" value="2"><button class="btn-inf" onclick="setInf('v_b')">∞</button></div></div>
        <div class="grup-input"><label>Variabel c</label><div class="wrapper-input"><input type="text" id="v_c" value="5"><button class="btn-inf" onclick="setInf('v_c')">∞</button></div></div>
        <div class="grup-input"><label>Variabel B</label><div class="wrapper-input"><input type="text" id="v_B" value="3"><button class="btn-inf" onclick="setInf('v_B')">∞</button></div></div>
    </div>

    <button class="btn-hitung" onclick="prosesKalkulasiManual()">= HITUNG ULANG FORMULA</button>
</div>

<script>
    let memoriExcel = [];

    // Fungsi buka tutup menu panah naik turun (Accordion)
    function toggleElemen(idTarget) {
        const elm = document.getElementById(idTarget);
        const tombol = elm.previousElementSibling;
        const ikonPanah = tombol ? tombol.querySelector('span:last-child') : document.getElementById('panahUtama');

        if (elm.style.display === "block") {
            elm.style.display = "none";
