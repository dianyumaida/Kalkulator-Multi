<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sudut dengan Menu Daftar Isi</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .calculator-box {
            background: #22252d;
            width: 390px;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        /* Desain Menu Berbentuk Daftar Isi (Table of Contents) */
        .toc-container {
            background: #292d36;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid #373e4a;
        }
        .toc-title {
            color: #888;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-left: 5px;
        }
        .toc-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .toc-item {
            width: 100%;
            padding: 10px 14px;
            background: #22252d;
            color: #aaa;
            border: 1px solid #373e4a;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .toc-item:hover {
            color: #ffffff;
            border-color: #4caf50;
        }
        /* Style untuk Menu Daftar Isi yang Sedang Aktif */
        .toc-item.active {
            background: #273c3a;
            color: #4caf50;
            border-color: #4caf50;
        }
        .toc-item .badge {
            font-size: 11px;
            background: #373e4a;
            padding: 2px 6px;
            border-radius: 6px;
            color: #fff;
        }
        .toc-item.active .badge {
            background: #4caf50;
            color: #22252d;
            font-weight: bold;
        }
        
        .screen-display {
            background: #292d36;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: right;
        }
        .screen-title {
            color: #888;
            font-size: 13px;
            text-align: left;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .main-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 32px;
            text-align: right;
            font-weight: bold;
            outline: none;
        }
        
        .slider-container {
            margin: 15px 0;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 5px;
            outline: none;
        }

        canvas {
            background: #292d36;
            border-radius: 20px;
            margin-bottom: 15px;
            width: 100%;
            display: block;
        }

        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .btn {
            border: none;
            outline: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-number { background-color: #292d36; color: #ffffff; }
        .btn-number:active { background-color: #373e4a; }
        
        .btn-func { background-color: #273c3a; color: #4caf50; }
        .btn-func:active { background-color: #1e524d; }

        .btn-operator { background-color: #ff9500; color: white; }
        .btn-operator:active { background-color: #e08400; }

        .btn-clear { background-color: #f44336; color: white; }
        .btn-clear:active { background-color: #d32f2f; }

        .info-panel {
            grid-column: span 4;
            background: #292d36;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 14px;
        }
        .info-panel span strong { font-size: 16px; }
        .color-a { color: #ff4757; }
        .color-b { color: #2ed573; }
    </style>
</head>
<body>

<div class="calculator-box">
    <!-- Menu Berbentuk Daftar Isi (Table of Contents) -->
    <div class="toc-container">
        <div class="toc-title">Daftar Isi Modul Sudut</div>
        <ul class="toc-list">
            <button class="toc-item active" id="toc-180" onclick="gantiModeSudut(180)">
                <span>1. Sudut Berpelurus</span>
                <span class="badge">180°</span>
            </button>
            <button class="toc-item" id="toc-90" onclick="gantiModeSudut(90)">
                <span>2. Sudut Berkomplemen</span>
                <span class="badge">90°</span>
            </button>
            <button class="toc-item" id="toc-360" onclick="gantiModeSudut(360)">
                <span>3. Sudut Satu Putaran</span>
                <span class="badge">360°</span>
            </button>
        </ul>
    </div>

    <div class="screen-display">
        <div id="rumusTeks" class="screen-title">Sudut A + Sudut B = 180°</div>
        <input type="text" id="angkaA" value="60" readonly class="main-input">
    </div>

    <canvas id="grafikSudut" width="350" height="160"></canvas>

    <div class="slider-container">
        <input type="range" id="sliderA" min="0" max="180" value="60" oninput="hentikanAnimasi(); updateSudut(this.value)">
    </div>

    <div class="keypad-grid">
        <!-- Baris 1 -->
        <button class="btn btn-clear" onclick="tekanKeypad('C')">C</button>
        <button class="btn btn-func" onclick="tekanKeypad('⌫')">⌫</button>
        <button id="btnShortcut1" class="btn btn-func" onclick="updateSudut(90)">90°</button>
        <button id="btnPlay" class="btn btn-operator" onclick="toggleAnimasi()">▶</button>
        
        <!-- Baris 2 -->
        <button class="btn btn-number" onclick="tekanKeypad('7')">7</button>
        <button class="btn btn-number" onclick="tekanKeypad('8')">8</button>
        <button class="btn btn-number" onclick="tekanKeypad('9')">9</button>
        <button id="btnShortcut2" class="btn btn-func" onclick="updateSudut(180)">180°</button>
        
        <!-- Baris 3 -->
        <button class="btn btn-number" onclick="tekanKeypad('4')">4</button>
        <button class="btn btn-number" onclick="tekanKeypad('5')">5</button>
        <button class="btn btn-number" onclick="tekanKeypad('6')">6</button>
        <button id="btnShortcut3" class="btn btn-func" onclick="updateSudut(45)">45°</button>
        
        <!-- Baris 4 -->
        <button class="btn btn-number" onclick="tekanKeypad('1')">1</button>
        <button class="btn btn-number" onclick="tekanKeypad('2')">2</button>
        <button class="btn btn-number" onclick="tekanKeypad('3')">3</button>
        <button class="btn btn-number" onclick="tekanKeypad('0')">0</button>

        <div class="info-panel">
            <span class="color-a">Sudut A: <strong id="valA">60</strong>°</span>
            <span class="color-b">Sudut B: <strong id="valB">120</strong>°</span>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('grafikSudut');
const ctx = canvas.getContext('2d');
const btnPlay = document.getElementById('btnPlay');
const inputAngka = document.getElementById('angkaA');
const sliderA = document.getElementById('sliderA');

let IDAnimasi = null;
let sedangBerputar = false;
let arahMaju = true;
let batasMaksimal = 180; 

// Logika Baru Sinkronisasi dengan Menu Daftar Isi
function gantiModeSudut(targetBatas) {
    hentikanAnimasi();
    batasMaksimal = targetBatas;
    
    // Perbarui status 'active' pada tombol daftar isi
    document.querySelectorAll('.toc-item').forEach(item => {
        item.classList.remove('active');
    });
    document.getElementById(`toc-${targetBatas}`).classList.add('active');

    // Sinkronisasi batas slider
    sliderA.max = batasMaksimal;
    
    const rumusTeks = document.getElementById('rumusTeks');
    const btn1 = document.getElementById('btnShortcut1');
    const btn2 = document.getElementById('btnShortcut2');
    const btn3 = document.getElementById('btnShortcut3');

    if (batasMaksimal === 180) {
        rumusTeks.innerText = "Sudut A + Sudut B = 180°";
        btn1.innerText = "90°";  btn1.setAttribute('onclick', 'updateSudut(90)');
        btn2.innerText = "180°"; btn2.setAttribute('onclick', 'updateSudut(180)');
        btn3.innerText = "45°";  btn3.setAttribute('onclick', 'updateSudut(45)');
        updateSudut(60); 
    } else if (batasMaksimal === 90) {
        rumusTeks.innerText = "Sudut A + Sudut B = 90°";
        btn1.innerText = "30°";  btn1.setAttribute('onclick', 'updateSudut(30)');
        btn2.innerText = "90°";  btn2.setAttribute('onclick', 'updateSudut(90)');
        btn3.innerText = "45°";  btn3.setAttribute('onclick', 'updateSudut(45)');
        updateSudut(30);
    } else if (batasMaksimal === 360) {
        rumusTeks.innerText = "Sudut A + Sudut B = 360°";
        btn1.innerText = "90°";  btn1.setAttribute('onclick', 'updateSudut(90)');
