<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Bertingkat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
        }

        /* Container utama menu */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 5px; /* Jarak vertikal antar menu */
            width: max-content;
        }

        /* Gaya umum untuk setiap kotak menu */
        .menu-item {
            background-color: #ffffff;
            border: 2px solid #000000; /* Garis tepi hitam seperti sketsa */
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            color: #333;
            min-width: 150px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* KUNCI PERGESERAN POSISI (ZIGZAG KE KANAN) */
        .menu-title { margin-left: 0px; }
        .item-30     { margin-left: 40px; }
        .item-31     { margin-left: 80px; }
        .item-40     { margin-left: 40px; } /* Kembali agak ke kiri sesuai gambar */
        .item-41     { margin-left: 90px; } /* Bergeser paling kanan */

    </style>
</head>
<body>

    <div class="menu-container">
        <div class="menu-item menu-title">sudut</div>
        <div class="menu-item item-30">30</div>
        <div class="menu-item item-31">31</div>
        <div class="menu-item item-40">40</div>
        <div class="menu-item item-41">41</div>
    </div>

</body>
</html>
