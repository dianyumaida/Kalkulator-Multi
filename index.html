<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Tombol Fisik Multirumus Modular</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f2f5; margin: 0; }
        .kalkulator { width: 360px; background: white; border: 2px solid #000; border-radius: 8px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .layar { border: 2px solid #000; height: 160px; margin-bottom: 15px; padding: 10px; box-sizing: border-box; background: #fafafa; font-size: 14px; overflow-y: auto; line-height: 1.4; }
        .menu-atas { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-pink { background: #ffe3d1; border: 1px solid #000; border-radius: 6px; height: 35px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .area-utama { display: flex; gap: 10px; }
        .panel-kiri { width: 110px; background: #e2efe0; border: 1px solid #000; border-radius: 6px; padding: 8px; display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; }
        .btn-menu-anak { background: white; border: 1px solid #000; border-radius: 4px; height: 35px; cursor: pointer; font-size: 11px; width: 100%; text-align: center; }
        .select-pilih { background: white; border: 1px solid red; border-radius: 4px; height: 35px; color: red; font-weight: bold; font-size: 11px; text-align: center; width: 100%; cursor: pointer; text-align-last: center; }
        .panel-kanan { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .grid-angka { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-angka { background: white; border: 1px solid #000; border-radius: 6px; height: 40px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .baris-bawah { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-jingga { background: #ffe3d1; border: 1px solid #000; border-radius: 6px; height: 40px; font-size: 14px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="kalkulator">
    <!-- Layar Utama -->
    <div class="layar" id="layarTampilan">
        <div><b>Mode: PANJANG</b></div>
        <div id="nilaiInput" style="font-size: 24px; font-weight: bold; margin-top: 5px; color: #222;">0</div>
        <div id="infoHasil" style="margin-top: 5px; color: #555;">Pilih sub-menu, ketik angka, tekan HITUNG.</div>
    </div>

    <!-- Menu Kategori Atas -->
    <div class="menu-atas">
        <button class="btn-pink" id="mPanjang">PANJANG</button>
        <button class="btn-pink" id="mKec">KEC.</button>
        <button class="btn-pink" id="mAngin">ANGIN</button>
        <button class="btn-pink" id="mAir">AIR</button>
        <button class="btn-pink" id="mHitung" style="background: #28a745; color: white;">HITUNG</button>
    </div>

    <div class="area-utama">
        <!-- Panel Kiri (Sub-Menu Anak + Dropdown PILIH Berisi Riwayat) -->
        <div class="panel-kiri">
            <button class="btn-menu-anak" id="sub1">Meter</button>
            <button class="btn-menu-anak" id="sub2">KM</button>
            <button class="btn-menu-anak" id="sub3">CM</button>
            
            <select class="select-pilih" id="pilihDataRiwayat">
                <option value="">&lt; PILIH &gt;</option>
            </select>
        </div>

        <!-- Panel Kanan (Numpad) -->
        <div class="panel-kanan">
            <div class="grid-angka">
                <button class="btn-angka num" data-val="1">1</button>
                <button class="btn-angka num" data-val="2">2</button>
                <button class="btn-angka num" data-val="3">3</button>
                <button class="btn-angka num" data-val="4">4</button>
                <button class="btn-angka num" data-val="5">5</button>
                <button class="btn-angka num" data-val="6">6</button>
                <button class="btn-angka num" data-val="7">7</button>
                <button class="btn-angka num" data-val="8">8</button>
                <button class="btn-angka num" data-val="9">9</button>
                <button class="btn-angka num" data-val="0">0</button>
            </div>
            
            <div class="baris-bawah">
                <button class="btn-jingga" id="backBtn">←</button>
                <button class="btn-jingga" id="delBtn">DELETE</button>
            </div>
        </div>
    </div>
</div>

<!-- SINKRONISASI AKTIF: MENARIK DARI FILE BERBEDA DALAM FOLDER RUMUS -->
<script type="module">
    import { hitungPanjang } from './rumus/panjang.js';
    import { hitungKecepatan } from './rumus/kecepatan.js';
    import { hitungAngin } from './rumus/angin.js';
    import { hitungAir } from './rumus/air.js';

    let kategoriAktif = 'panjang';
    let subAktif = 0; 
    let inputSekarang = '0';
    let riwayatKalkulator = JSON.parse(localStorage.getItem('riwayat_tombol')) || [];
    let dataKecepatan = { jarak: 0, waktu: 1 };

    const labelSub = {
        panjang: ['Dari Meter', 'Dari KM', 'Dari CM'],
        kecepatan: ['Jarak (m)', 'Waktu (s)', 'Siap Hitung'],
        angin: ['Dari m/s', 'Dari km/j', '-'],
        air: ['Dari m/s', 'Dari km/j', '-']
    };

    const opsiUnit = {
        panjang: ['m', 'km', 'cm'],
        kecepatan: ['m', 'km', 'cm'],
        angin: ['ms', 'kmh', 'ms'],
        air: ['ms', 'kmh', 'ms']
    };

    function perbaruiDropdown() {
        const drop = document.getElementById('pilihDataRiwayat');
        let html = '<option value="">&lt; PILIH &gt;</option>';
        riwayatKalkulator.forEach((item, idx) => {
            html += `<option value="${idx}">[${item.kat.toUpperCase()}] ${item.input}</option>`;
        });
        drop.innerHTML = html;
    }

    function setKategori(kat) {
        kategoriAktif = kat; subAktif = 0; inputSekarang = '0';
        document.getElementById('nilaiInput').innerText = '0';
        document.getElementById('sub1').innerText = labelSub[kat][0];
        document.getElementById('sub2').innerText = labelSub[kat][1];
        document.getElementById('sub3').innerText = labelSub[kat][2];
        document.getElementById('infoHasil').innerHTML = `<b>Mode: ${kat.toUpperCase()}</b><br>Ketik angka lalu tekan HITUNG.`;
    }

    // Event Kategori Atas
    document.getElementById('mPanjang').addEventListener('click', () => setKategori('panjang'));
    document.getElementById('mKec').addEventListener('click', () => setKategori('kecepatan'));
    document.getElementById('mAngin').addEventListener('click', () => setKategori('angin'));
    document.getElementById('mAir').addEventListener('click', () => setKategori('air'));

    // Event Sub-Menu Kiri
    document.getElementById('sub1').addEventListener('click', () => { subAktif = 0; inputSekarang = '0'; document.getElementById('infoHasil').innerHTML = `Unit aktif: <b>${labelSub[kategoriAktif][0]}</b>`; });
    document.getElementById('sub2').addEventListener('click', () => { subAktif = 1; inputSekarang = '0'; document.getElementById('infoHasil').innerHTML = `Unit aktif: <b>${labelSub[kategoriAktif][1]}</b>`; });
    document.getElementById('sub3').addEventListener('click', () => { subAktif = 2; inputSekarang = '0'; document.getElementById('infoHasil').innerHTML = `Unit aktif: <b>${labelSub[kategoriAktif][2]}</b>`; });

    // Event Numpad Angka
    document.querySelectorAll('.num').forEach(btn => {
        btn.addEventListener('click', (e) => {
            let val = e.target.getAttribute('data-val');
            if (inputSekarang === '0') inputSekarang = val;
            else inputSekarang += val;
            document.getElementById('nilaiInput').innerText = inputSekarang;
        });
    });

    document.getElementById('backBtn').addEventListener('click', () => {
        if (inputSekarang.length > 1) inputSekarang = inputSekarang.slice(0, -1);
        else inputSekarang = '0';
        document.getElementById('nilaiInput').innerText = inputSekarang;
    });

    // PROSES EKSEKUSI UTAMA MEMANGGIL FUNGSI DARI MASING-MASING FILE FOLDER
    document.getElementById('mHitung').addEventListener('click', () => {
        const nilai = parseFloat(inputSekarang);
        if (isNaN(nilai)) return;

        let hasilHTML = "";
        let ringkasan = "";
        const unitAsal = opsiUnit[kategoriAktif][subAktif];

        if (kategoriAktif === 'panjang') {
            const hasil = hitungPanjang(nilai, unitAsal);
            hasilHTML = `• ${hasil.m.toFixed(1)} m<br>• ${hasil.km.toFixed(4)} km<br>• ${hasil.cm.toFixed(0)} cm`;
            ringkasan = `${nilai} ${unitAsal}`;
        } 
        else if (kategoriAktif === 'kecepatan') {
            if (subAktif === 0) {
                dataKecepatan.jarak = nilai;
                document.getElementById('infoHasil').innerHTML = "Jarak disimpan! Klik 'Waktu (s)' di kiri lalu isi angka waktu.";
                return;
            } else {
                dataKecepatan.waktu = nilai || 1;
                const hasil = hitungKecepatan(dataKecepatan.jarak, dataKecepatan.waktu, opsiUnit.kecepatan[0]);
                hasilHTML = `• s: ${dataKecepatan.jarak} m, t: ${dataKecepatan.waktu} s<br>• v: <b>${hasil.ms.toFixed(2)} m/s</b><br>• v: <b>${hasil.kmh.toFixed(2)} km/jam</b>`;
                ringkasan = `s:${dataKecepatan.jarak}m t:${dataKecepatan.waktu}s`;
            }
        } 
        else if (kategoriAktif === 'angin') {
            const hasil = hitungAngin(nilai, unitAsal);
            hasilHTML = `• v: ${nilai} ${unitAsal}<br>• <b>${hasil.pa.toFixed(2)} Pa</b><br>• <b>${hasil.bar.toFixed(5)} Bar</b>`;
            ringkasan = `${nilai} ${unitAsal}`;
        } 
        else if (kategoriAktif === 'air') {
            const hasil = hitungAir(nilai, unitAsal);
