<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Kotak Pilihan Simpel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        /* SATU KOTAK UTUH (Sesuai Gambar) */
        .kotak-pilih {
            width: 300px;
            background-color: #ffffff;
            border: 2px solid #333333;
            border-radius: 12px;
            overflow: hidden;
        }

        /* Desain Baris Umum */
        .baris {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #dddddd;
            font-size: 16px;
        }

        /* Menghilangkan garis di baris paling bawah */
        .baris:last-child {
            border-bottom: none;
        }

        /* Baris Judul Paling Atas */
        .judul {
            background-color: #f0f0f0;
            font-weight: bold;
        }

        /* KUNCI: Menjorok ke dalam untuk sub-menu (a1, b1) */
        .sub-menu {
            padding-left: 45px; /* Memberi jarak ke kanan */
            background-color: #fafafa;
            color: #555555;
        }

        /* Lingkaran Bulat di Sebelah Kanan */
        .bulatan-radio {
            width: 14px;
            height: 14px;
            border: 2px solid #666666;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <!-- Semua komponen masuk dalam satu container ini -->
    <div class="kotak-pilih">
        
        <!-- Judul Atas -->
        <div class="baris judul">
            <span>Pilih</span>
            <div class="bulatan-radio" style="opacity: 0.2;"></div>
        </div>

        <!-- Menu Utama A -->
        <div class="baris">
            <span>a0</span>
            <div class="bulatan-radio"></div>
        </div>

        <!-- Sub Menu dari A (Menjorok) -->
        <div class="baris sub-menu">
            <span>a1</span>
            <div class="bulatan-radio"></div>
        </div>

        <div class="baris sub-menu">
            <span>b1</span>
            <div class="bulatan-radio"></div>
        </div>

        <!-- Menu Utama B -->
        <div class="baris">
            <span>b0</span>
            <div class="bulatan-radio"></div>
        </div>

        <!-- Sub Menu dari B (Menjorok) -->
        <div class="baris sub-menu">
            <span>b1</span>
            <div class="bulatan-radio"></div>
        </div>

    </div>

</body>
</html>
