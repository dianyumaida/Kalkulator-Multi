<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sudut Multi-Mode Interaktif</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .calculator-box {
            background: #22252d;
            width: 380px;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: #fff;
        }
        h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
            color: #29d8b1;
        }
        .menu-container {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 12px;
            color: #8b939c;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .select-menu, .input-field {
            width: 100%;
            padding: 14px;
            background: #2a2d36;
            border: none;
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        .select-menu:focus, .input-field:focus {
            background: #323642;
            box-shadow: 0 0 0 2px #29d8b1;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .btn-calc {
            width: 100%;
            padding: 15px;
            background: #29d8b1;
            border: none;
            border-radius: 15px;
            color: #17181a;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        .btn-calc:hover {
            background: #22be9b;
            transform: translateY(-1px);
        }
        .btn-calc:active {
            transform: translateY(1px);
        }
        .result-box {
            background: #2a2d36;
            padding: 20px;
            border-radius: 20px;
            border-left: 5px solid #29d8b1;
        }
        .result-title {
            font-size: 12px;
            color: #8b939c;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .result-value {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="calculator-box">
        <h3>Kalkulator Sudut</h3>
        
        <!-- Pilihan Mode -->
        <div class="menu-container">
            <label for="calc-mode">Pilih Mode Konversi</label>
            <select id="calc-mode" class="select-menu" onchange="updateLabels()">
                <option value="deg-to-rad">Derajat (°) ke Radian (rad)</option>
                <option value="rad-to-deg">Radian (rad) ke Derajat (°)</option>
                <option value="deg-to-grad">Derajat (°) ke Gradian (grad)</option>
            </select>
        </div>

        <!-- Input Nilai -->
        <div class="input-group">
            <label id="input-label" for="angle-input">Masukkan Nilai (Derajat)</label>
            <input type="number" id="angle-input" class="input-field" placeholder="0" step="any">
        </div>

        <!-- Tombol Hitung -->
        <button class="btn-calc" onclick="calculateAngle()">HITUNG</button>

        <!-- Tampilan Hasil -->
        <div class="result-box">
            <div class="result-title">Hasil Analisis:</div>
            <div id="result-display" class="result-value">0 rad</div>
        </div>
    </div>

    <script>
        // Fungsi untuk mengubah teks label secara dinamis sesuai mode yang dipilih
        function updateLabels() {
            const mode = document.getElementById('calc-mode').value;
            const inputLabel = document.getElementById('input-label');
            const resultDisplay = document.getElementById('result-display');
            const inputField = document.getElementById('angle-input');
            
            // Reset input dan hasil saat ganti mode
            inputField.value = '';
            
            if (mode === 'deg-to-rad') {
                inputLabel.innerText = "Masukkan Nilai (Derajat)";
                resultDisplay.innerText = "0 rad";
            } else if (mode === 'rad-to-deg') {
                inputLabel.innerText = "Masukkan Nilai (Radian)";
                resultDisplay.innerText = "0°";
            } else if (mode === 'deg-to-grad') {
                inputLabel.innerText = "Masukkan Nilai (Derajat)";
                resultDisplay.innerText = "0 grad";
            }
        }

        // Fungsi utama logika perhitungan matematis
        function calculateAngle() {
            const mode = document.getElementById('calc-mode').value;
            const inputValue = parseFloat(document.getElementById('angle-input').value);
            const resultDisplay = document.getElementById('result-display');

            // Validasi jika input kosong atau bukan angka
            if (isNaN(inputValue)) {
                resultDisplay.innerText = "Masukkan angka valid";
                resultDisplay.style.color = "#ff6b6b";
                return;
            }
            
            resultDisplay.style.color = "#fff"; // Reset warna teks ke putih jika valid
            let result = 0;

            switch (mode) {
                case 'deg-to-rad':
                    // Rumus: Derajat * (π / 180)
                    result = inputValue * (Math.PI / 180);
                    resultDisplay.innerText = result.toFixed(5) + " rad";
                    break;
                    
                case 'rad-to-deg':
                    // Rumus: Radian * (180 / π)
                    result = inputValue * (180 / Math.PI);
                    resultDisplay.innerText = result.toFixed(4) + "°";
                    break;
                    
                case 'deg-to-grad':
                    // Rumus: Derajat * (400 / 360) atau Derajat * 1.1111...
                    result = inputValue * (400 / 360);
                    resultDisplay.innerText = result.toFixed(4) + " grad";
                    break;
                    
                default:
                    resultDisplay.innerText = "Mode tidak dikenal";
            }
        }
    </script>
</body>
</html>
