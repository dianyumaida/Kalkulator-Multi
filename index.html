<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Multi - Sesuai Gambar</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1d24;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* CONTAINER UTAMA NEO-BRUTALISME */
        .kalkulator-box {
            width: 340px;
            background-color: #ffffff;
            border: 2.5px solid #000000;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 5px 5px 0px #000000;
        }

        /* SCREEN DISPLAY */
        .display-screen {
            width: 100%;
            height: 130px;
            border: 2.5px solid #000000;
            border-radius: 6px;
            background-color: #ffffff;
            margin-bottom: 14px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .display-screen .indicator-merah {
            color: #bd2a2a;
            font-weight: bold;
            font-size: 24px;
            margin: 0;
        }

        .display-screen .main-number {
            align-self: flex-end;
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            margin: 0;
            word-break: break-all;
        }

        /* BARIS TOMBOL OPERASI (+ - * : =) */
        .row-operasi {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }

        .btn-ops {
            background-color: #ffdecb;
            border: 2.5px solid #000000;
            border-radius: 6px;
            padding: 10px 0;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 1.5px 1.5px 0px #000000;
        }

        /* AREA BAWAH */
        .area-bawah {
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: 12px;
        }

        /* PANEL KIRI (HIJAU) */
        .panel-kiri {
            background-color: #e2ede2;
            border: 2.5px solid #000000;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
        }

        .field-box {
            background-color: #ffffff;
            border: 1.5px solid #000000;
            border-radius: 5px;
            height: 35px;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-size: 12px;
            font-weight: bold;
            color: #333333;
        }

        .btn-pilih {
            background-color: #ffffff;
            border: 1.5px solid #bd2a2a;
            color: #bd2a2a;
            font-weight: bold;
            font-size: 13px;
            padding: 8px 0;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            box-shadow: 1px 1px 0px #000000;
            user-select: none;
        }

        /* IFRAME POPUP MENU */
        .iframe-container {
            position: absolute;
            left: -5px;
            top: 165px;
            width: 310px;
            height: 250px;
            z-index: 100;
            display: none;
            border: 2.5px solid #000000;
            border-radius: 6px;
            box-shadow: 4px 4px 0px #000;
            background-color: white;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* GRID PAPAN ANGKA */
        .grid-angka-kanan {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .btn-num {
            background-color: #ffffff;
            border: 2.5px solid #000000;
            border-radius: 6px;
            padding: 12px 0;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 1.5px 1.5px 0px #000000;
            text-align: center;
        }

        .btn-kuning { background-color: #ffeeb3; }
        .btn-orange { background-color: #ffcab0; font-size: 14px; }
    </style>
</head>
<body>

    <div class="kalkulator-box">
        <!-- DISPLAY -->
        <div class="display-screen">
            <div class="indicator-merah" id="txtIndikator">0</div>
            <div class="main-number" id="txtDisplay">0</div>
        </div>

        <!-- BARIS OPERASI -->
        <div class="row-operasi">
            <button class="btn-ops" onclick="pressOps('+')">+</button>
            <button class="btn-ops" onclick="pressOps('-')">-</button>
            <button class="btn-ops" onclick="pressOps('×')">×</button>
            <button class="btn-ops" onclick="pressOps(':')">:</button>
            <button class="btn-ops" onclick="hitungHasil()">=</button>
        </div>

        <!-- BAGIAN BAWAH -->
        <div class="area-bawah">
            <!-- PANEL KIRI -->
            <div class="panel-kiri">
                <div class="field-box" id="boxMenu">- Menu -</div>
                <div class="field-box" id="boxVal1">Input 1: -</div>
                <div class="field-box" id="boxVal2">Input 2: -</div>
                
                <div class="btn-pilih" onclick="toggleMenuIframe()">&lt; PILIH &gt;</div>

                <div class="iframe-container" id="popupIframeMenu">
                    <!-- Pastikan nama folder huruf besar/kecilnya sesuai -->
                    <iframe src="Folder/pilih.html"></iframe>
                </div>
            </div>

            <!-- GRID ANGKA SESUAI MATRIKS GAMBAR -->
            <div class="grid-angka-kanan">
                <button class="btn-num" onclick="pressNum(6)">6</button>
                <button class="btn-num" onclick="pressNum(1)">1</button>
                <button class="btn-num" onclick="pressNum(7)">7</button>
                <button class="btn-num" onclick="pressNum(2)/">2</button>
                <button class="btn-num" onclick="pressNum(8)">8</button>
                <button class="btn-num" onclick="pressNum(3)">3</button>
                <button class="btn-num" onclick="pressNum(9)">9</button>
                <button class="btn-num" onclick="pressNum(4)">4</button>
                <button class="btn-num" onclick="pressNum(0)">0</button>
                <button class="btn-num" onclick="pressNum(5)">5</button>
                <button class="btn-num btn-kuning" onclick="pressBackspace()">←</button>
                <button class="btn-num btn-orange" onclick="pressDelete()">DELETE</button>
            </div>
        </div>
    </div>

    <script>
        const popupIframeMenu = document.getElementById('popupIframeMenu');
        const boxMenu = document.getElementById('boxMenu');
        const boxVal1 = document.getElementById('boxVal1');
        const boxVal2 = document.getElementById('boxVal2');
        const txtDisplay = document.getElementById('txtDisplay');
        const txtIndikator = document.getElementById('txtIndikator');
        
        let angkaSkor = '';
        let rumusAktif = '';
        let memoriAngka = 0;
        let operasiAktif = '';

        function toggleMenuIframe() {
            popupIframeMenu.style.display = (popupIframeMenu.style.display === "block") ? "none" : "block";
        }

        // FUNGSI GLOBAL SINKRONISASI DROPDOWN DARI DALAM FOLDER
        window.terimaDataDariFolder = function(namaTerpilih, kodeRumus) {
            boxMenu.innerText = namaTerpilih;
            txtIndikator.innerText = kodeRumus.toUpperCase();
            rumusAktif = kodeRumus;
            
            popupIframeMenu.style.display = "none";
            angkaSkor = '';
            txtDisplay.innerText = '0';
            boxVal1.innerText = "Input 1: -";
            boxVal2.innerText = "Input 2: -";
        };

        // INPUT ANGKA PAPAN KETIK
        function pressNum(num) {
            if (angkaSkor === '0') angkaSkor = '';
            angkaSkor += num;
            txtDisplay.innerText = angkaSkor;
        }

        function pressDelete() {
            angkaSkor = '';
            memoriAngka = 0;
            operasiAktif = '';
            txtDisplay.innerText = '0';
            boxVal1.innerText = "Input 1: -";
            boxVal2.innerText = "Input 2: -";
        }

        function pressBackspace() {
            angkaSkor = angkaSkor.slice(0, -1);
            txtDisplay.innerText = angkaSkor || '0';
        }

        // FUNGSI OPERASI UTAMA (+, -, *, :)
        function pressOps(ops) {
            if (!angkaSkor && txtDisplay.innerText !== '0') {
                memoriAngka = parseFloat(txtDisplay.innerText);
            } else {
                memoriAngka = parseFloat(angkaSkor) || 0;
            }
            operasiAktif = ops;
            boxVal1.innerText = "Input 1: " + memoriAngka;
            boxVal2.innerText = "Ops: " + ops;
            angkaSkor = '';
        }

        // EKSEKUSI HASIL AKHIR (=)
        function hitungHasil() {
            let angkaKedua = parseFloat(angkaSkor) || 0;
            let hasil = 0;

            // Jika operasi standar (+ - * :) aktif
            if (operasiAktif) {
                boxVal2.innerText = "Input 2: " + angkaKedua;
                if (operasiAktif === '+') hasil = memoriAngka + angkaKedua;
                else if (operasiAktif === '-') hasil = memoriAngka - angkaKedua;
                else if (operasiAktif === '×') hasil = memoriAngka * angkaKedua;
                else if (operasiAktif === ':') hasil = angkaKedua !== 0 ? memoriAngka / angkaKedua : "Error";
