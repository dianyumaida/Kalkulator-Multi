<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Sinkronisasi Data</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f5f5f5; }
        .box { margin-bottom: 15px; }
        select, button { padding: 10px; font-size: 16px; width: 200px; display: block; margin-top: 5px; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <!-- Kotak Pertama: Menu Utama -->
    <div class="box">
        <label>Pilih Menu:</label>
        <select id="menuUtama" onchange="ambilDataAngka()">
            <option value="">-- Pilih Menu --</option>
            <option value="Menu A">Menu A</option>
            <option value="Menu B">Menu B</option>
        </select>
    </div>

    <!-- Kotak Kedua: Otomatis Muncul Angka secara Sinkron -->
    <div class="box">
        <label>Nilai Angka:</label>
        <select id="menuAngka">
            <option value="">-- Pilih Angka --</option>
        </select>
    </div>

    <!-- Tombol GO -->
    <button onclick="prosesGo()">GO</button>

    <!-- Tabel Output Kolom 1 dan Kolom 2 -->
    <table>
        <thead>
            <tr>
                <th>Kolom 1 (Menu)</th>
                <th>Kolom 2 (Nilai Angka)</th>
            </tr>
        </thead>
        <tbody id="tabelBody">
            <!-- Hasil sinkronisasi muncul di sini -->
        </tbody>
    </table>

    <script>
        // GANTI LINK INI dengan URL tempat Anda menyimpan file myconfig.php online nanti
        const URL_CONFIG_ONLINE = "myconfig.php"; 
        
        let dataConfigGlobal = {};

        // Fungsi mengambil data dari config file secara online saat halaman dibuka
        async function muatConfigAwal() {
            try {
                let tanggapan = await fetch(URL_CONFIG_ONLINE);
                dataConfigGlobal = await tanggapan.json();
                console.log("Data config berhasil dimuat online!");
            } catch (error) {
                console.log("Gagal memuat data online, menggunakan data cadangan.");
                // Data cadangan jika offline
                dataConfigGlobal = { "Menu A": [10, 20], "Menu B": [100, 200] };
            }
        }

        // Fungsi saat kotak pertama dipilih: kotak kedua langsung sinkron memuat angka
        function ambilDataAngka() {
            const menuDipilih = document.getElementById("menuUtama").value;
            const menuAngka = document.getElementById("menuAngka");
            
            // Bersihkan pilihan angka lama
            menuAngka.innerHTML = '<option value="">-- Pilih Angka --</option>';
            
            // Ambil array angka dari data config yang cocok
            if (menuDipilih && dataConfigGlobal[menuDipilih]) {
                dataConfigGlobal[menuDipilih].forEach(angka => {
                    let opsi = document.createElement("option");
                    opsi.value = angka;
                    opsi.textContent = angka;
                    menuAngka.appendChild(opsi);
                });
            }
        }

        // Fungsi saat tombol GO ditekan: Kolom 1 dan 2 langsung sinkron di dalam tabel
        function prosesGo() {
            const menu = document.getElementById("menuUtama").value;
            const angka = document.getElementById("menuAngka").value;
            const tabelBody = document.getElementById("tabelBody");

            if (!menu || !angka) {
                alert("Pilih Menu dan Angka terlebih dahulu!");
                return;
            }

            // Masukkan ke tabel secara bersamaan (singkron)
            tabelBody.innerHTML = `
                <tr>
                    <td><strong>${menu}</strong></td>
                    <td><strong>${angka}</strong></td>
                </tr>
            `;
        }

        // Jalankan fungsi muat data saat pertama kali aplikasi dibuka
        muatConfigAwal();
    </script>
</body>
</html>
