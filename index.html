<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Multirumus</title>
    <style>
        body { 'Segoe UI', sans-serif; padding: 30px; background: #f0f2f5; color: #333; }
        .box { max-width: 480px; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .opsi-box { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #fcfcfc; 20px; }
        .radio-item { 10px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .input-group { 15px; }
        label { font-weight: bold; display: block; 5px; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #0056b3; }
        #panelHasil { 20px; padding: 15px; background: #e9f5ff; border-left: 5px solid #007bff; border-radius: 4px; display: none; 1.6; }
    </style>
</head>
<body>
 
<div class="box">
    <h2>🧮 Pilih & Hitung Rumus</h2>
    
    <!-- Pilihan Anak Rumus via Radio Button -->
    <div class="opsi-box">
        <label style=" 10px; color:#555;">Pilih Kategori Rumus:</label>
        <label class="radio-item"><input type="radio" name="rumus" value="panjang" checked> Rumus Panjang (Konversi m)</label>
        <label class="radio-item"><input type="radio" name="rumus" value="kecepatan"> Rumus Kecepatan (v = s/t)</label>
        <label class="radio-item"><input type="radio" name="rumus" value="angin"> Rumus Tekanan Angin (0.6 * v²)</label>
        <label class="radio-item"><input type="radio" name="rumus" value="air"> Rumus Tekanan Air (500 * v²)</label>
    </div>
 
    <!-- Form Input Dinamis -->
    <div class="input-group">
        <label id="labelInput1">Masukkan Nilai Panjang (meter):</label>
        <input type="number" id="input1" value="10" step="any">
    </div>
    
    <div class="input-group" id="boxInput2" style="display: none;">
        <label id="labelInput2">Masukkan Waktu (detik):</label>
        <input type="number" id="input2" value="2" min="0.1" step="any">
    </div>
 
    <button id="btnHitung">Proses Perhitungan</button>
 
    <!-- Tampilan Sinkronisasi Hasil -->
    <div id="panelHasil"></div>
</div>
 
<!-- Sinkronisasi dan Import Berkas ke Folder rumus -->
<script type="module">
    import { hitungPanjang } from './rumus/panjang.js';
    import { hitungKecepatan } from './rumus/kecepatan.js';
    import { hitungAngin } from './rumus/angin.js';
    import { hitungAir } from './rumus/air.js';
 
    const radios = document.querySelectorAll('input[name="rumus"]');
    const labelInput1 = document.getElementById('labelInput1');
    const boxInput2 = document.getElementById('boxInput2');
    const panelHasil = document.getElementById('panelHasil');
 
    // Mengubah label dan form secara otomatis saat radio button dipindah
    radios.forEach(radio => {
        radio.addEventListener('change', (e) => {
            panelHasil.style.display = "none"; // Sembunyikan hasil lama
            const opsi = e.target.value;
 
            if (opsi === 'panjang') {
                labelInput1.innerText = "Masukkan Nilai Panjang (meter):";
                boxInput2.style.display = "none";
            } else if (opsi === 'kecepatan') {
                labelInput1.innerText = "Masukkan Jarak Lintasan (meter):";
                boxInput2.style.display = "block"; // Aktifkan input waktu
            } else if (opsi === 'angin') {
                labelInput1.innerText = "Masukkan Kecepatan Angin (m/s):";
                boxInput2.style.display = "none";
            } else if (opsi === 'air') {
                labelInput1.innerText = "Masukkan Kecepatan Aliran Air (m/s):";
                boxInput2.style.display = "none";
            }
        });
    });
 
    // Proses kalkulasi ketika tombol ditekan
    document.getElementById('btnHitung').addEventListener('click', () => {
        const val1 = parseFloat(document.getElementById('input1').value);
        const val2 = parseFloat(document.getElementById('input2').value);
        const rumusTerpilih = document.querySelector('input[name="rumus"]:checked').value;
        
        if (isNaN(val1)) {
            alert("Harap masukkan nilai input pertama dengan benar!");
            return;
        }
 
        let kontenHasil = "";
 
        // Eksekusi fungsi sesuai file JS dalam folder yang dituju
        if (rumusTerpilih === 'panjang') {
            const hasil = hitungPanjang(val1);
            kontenHasil = `
                <strong>Hasil Konversi Panjang:</strong><br>
                ${val1} Meter = <b>${hasil.km.toFixed(4)} Km</b><br>
                ${val1} Meter = <b>${hasil.cm.toFixed(0)} Cm</b>
            `;
        } else if (rumusTerpilih === 'kecepatan') {
            const hasil = hitungKecepatan(val1, val2);
            kontenHasil = `
                <strong>Hasil Rumus Kecepatan:</strong><br>
                Kecepatan (v) = Jarak / Waktu<br>
                Hasil: <b>${hasil.toFixed(2)} m/s</b>
            `;
        } else if (rumusTerpilih === 'angin') {
            const hasil = hitungAngin(val1);
            kontenHasil = `
                <strong>Hasil Tekanan Dinamis Angin:</strong><br>
                Tekanan (P) = 0.6 * v²<br>
                Hasil: <b>${hasil.toFixed(2)} Pascal (Pa)</b>
            `;
        } else if (rumusTerpilih === 'air') {
            const hasil = hitungAir(val1);
            kontenHasil = `
                <strong>Hasil Tekanan Dinamis Air:</strong><br>
                Tekanan (P) = 500 * v²<br>
                Hasil: <b>${hasil.toFixed(2)} Pascal (Pa)</b>
            `;
        }
 
        // Sinkronisasi data ke tampilan luar
        panelHasil.innerHTML = kontenHasil;
        panelHasil.style.display = "block";
    });
</script>
 
</body>
</html>
