<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Bercabang</title>
    <style>
        body {
            background-color: #4a4a4a;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        /* Container Menu Utama */
        .menu-container {
            background-color: #1a2525; /* Warna gelap sesuai gambar */
            border-radius: 16px;
            overflow: hidden;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Item Menu */
        .menu-item {
            border-bottom: 1px solid #2d3d3d;
        }

        /* Tombol Pilihan Utama */
        .menu-button {
            width: 100%;
            padding: 15px;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-button:hover {
            background-color: #223131;
        }

        /* Lingkaran Radio Button Pasif */
        .radio-circle {
            width: 16px;
            height: 16px;
            border: 2px solid #a0a0a0;
            border-radius: 50%;
        }

        /* Sub-Menu (Pilihan di Dalam Pilihan) */
        .sub-menu {
            display: none; /* Tersembunyi secara default */
            background-color: #121a1a;
            padding-left: 20px;
        }

        /* Item di dalam Sub-Menu */
        .sub-item {
            padding: 12px 15px;
            color: #b0c0c0;
            font-size: 14px;
            border-bottom: 1px solid #1f2b2b;
            cursor: pointer;
        }

        .sub-item:hover {
            color: #00bcd4; /* Efek warna biru muda saat disentuh */
        }

        /* Kelas Aktif untuk Menampilkan Sub-Menu */
        .show {
            display: block;
        }
    </style>
</head>
<body>

<div class="menu-container">
    
    <!-- PILIHAN 1 -->
    <div class="menu-item">
        <button class="menu-button" onclick="toggleSubMenu('sub-kotak')">
            <span>Luas & Keliling Kotak (Persegi)</span>
            <div class="radio-circle"></div>
        </button>
        <!-- Sub Pilihan -->
        <div id="sub-kotak" class="sub-menu">
            <div class="sub-item">» Hitung Luas Persegi</div>
            <div class="sub-item">» Hitung Keliling Persegi</div>
            <div class="sub-item">» Hitung Sisi (jika diketahui luas)</div>
        </div>
    </div>

    <!-- PILIHAN 2 -->
    <div class="menu-item">
        <button class="menu-button" onclick="toggleSubMenu('sub-segitiga')">
            <span>Luas Segitiga</span>
            <div class="radio-circle"></div>
        </button>
        <!-- Sub Pilihan -->
        <div id="sub-segitiga" class="sub-menu">
            <div class="sub-item">» Segitiga Sama Sisi</div>
            <div class="sub-item">» Segitiga Sama Kaki</div>
            <div class="sub-item">» Segitiga Siku-Siku</div>
        </div>
    </div>

    <!-- PILIHAN 3 -->
    <div class="menu-item">
        <button class="menu-button" onclick="toggleSubMenu('sub-bola')">
            <span>Volume & Luas Permukaan Bola</span>
            <div class="radio-circle"></div>
        </button>
        <!-- Sub Pilihan -->
        <div id="sub-bola" class="sub-menu">
            <div class="sub-item">» Hitung Volume Bola</div>
            <div class="sub-item">» Hitung Luas Permukaan</div>
        </div>
    </div>

</div>

<!-- JAVASCRIPT UNTUK LOGIKA KLIK -->
<script>
    function toggleSubMenu(id) {
        // Ambil elemen sub-menu berdasarkan ID
        var subMenu = document.getElementById(id);
        
        // Cek apakah sub-menu sedang terbuka atau tertutup
        if (subMenu.classList.contains('show')) {
            subMenu.classList.remove('show');
        } else {
            // Tutup semua sub-menu terlebih dahulu agar rapi
            var allSubMenus = document.querySelectorAll('.sub-menu');
            allSubMenus.forEach(function(menu) {
                menu.classList.remove('show');
            });
            // Buka sub-menu yang diklik
            subMenu.classList.add('show');
        }
    }
</script>

</body>
</html>
