<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konverter Mata Uang</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        select, input { padding: 8px; margin-right: 10px; }
        button { padding: 8px 15px; cursor: pointer; }
        #resultDiv { margin-top: 20px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h2>Konverter Mata Uang</h2>

    <div class="input-group">
        <label for="amount">Jumlah:</label>
        <input type="number" id="amount" value="1" min="1">
    </div>

    <div class="input-group">
        <select id="fromCurrency">
            <option value="USD" selected>USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="IDR">IDR - Indonesian Rupiah</option>
            <option value="SGD">SGD - Singapore Dollar</option>
        </select>

        <!-- Tombol untuk menukar arah mata uang -->
        <button id="swapBtn">⇆ Tukar</button>

        <select id="toCurrency">
            <option value="IDR" selected>IDR - Indonesian Rupiah</option>
            <option value="USD">USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="SGD">SGD - Singapore Dollar</option>
        </select>
    </div>

    <button id="convertBtn">Konversi</button>

    <div id="resultDiv"></div>

    <script>
        // Mengambil elemen HTML
        const amountInput = document.getElementById('amount');
        const fromCurrencySelect = document.getElementById('fromCurrency');
        const toCurrencySelect = document.getElementById('toCurrency');
        const convertBtn = document.getElementById('convertBtn');
        const swapBtn = document.getElementById('swapBtn');
        const resultDiv = document.getElementById('resultDiv');

        // Fungsi Utama Konversi Mata Uang
        async function convertCurrency() {
            const amount = parseFloat(amountInput.value);
            const fromCurrency = fromCurrencySelect.value;
            const toCurrency = toCurrencySelect.value;

            // Jika mata uang asal dan tujuan sama
            if (fromCurrency === toCurrency) {
                resultDiv.innerHTML = `${amount} ${fromCurrency} = <br><span style="color:#007bff">${amount.toFixed(2)} ${toCurrency}</span>`;
                return;
            }

            resultDiv.innerHTML = 'Memuat data...';

            try {
                // Mengambil data kurs dari API publik Frankfurter
                const response = await fetch(`https://frankfurter.dev{fromCurrency}&symbols=${toCurrency}`);
                const data = await response.json();

                // Memastikan data rates untuk mata uang tujuan tersedia
                if (data.rates && data.rates[toCurrency]) {
                    const rate = data.rates[toCurrency];
                    const convertedAmount = amount * rate;
                    
                    resultDiv.innerHTML = `${amount} ${fromCurrency} = <br><span style="color:#007bff">${convertedAmount.toLocaleString('id-ID', {minimumFractionDigits: 2})} ${toCurrency}</span>`;
                } else {
                    resultDiv.innerHTML = 'Kurs tidak ditemukan.';
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = 'Gagal memuat data API.';
            }
        }

        // Fungsi Fitur Tombol Tukar (Swap)
        function swapCurrencies() {
            const temp = fromCurrencySelect.value;
            fromCurrencySelect.value = toCurrencySelect.value;
            toCurrencySelect.value = temp;
            
            // Otomatis hitung ulang setelah ditukar
            convertCurrency();
        }

        // Event Listeners
        convertBtn.addEventListener('click', convertCurrency);
        swapBtn.addEventListener('click', swapCurrencies);
    </script>
</body>
</html>
