<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Dropdown Bertingkat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        /* Kotak Utama Menu */
        .dropdown-box {
            width: 320px;
            background-color: #ffffff;
            border: 2px solid #333333;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.1);
        }

        /* Struktur Baris Menu */
        .menu-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #cccccc;
            cursor: pointer;
            user-select: none;
            background-color: #ffffff;
        }

        .menu-row:last-child {
            border-bottom: none;
        }

        /* Header "Pilih" */
        .header-pilih {
            background-color: #eaeaea;
            font-weight: bold;
            font-size: 18px;
            cursor: default;
        }

        /* Teks Menu Utama (a0, b0) */
        .menu-text {
            font-size: 16px;
            font-weight: 500;
        }

        /* Komponen Lingkaran Radio Button */
        .radio-dot {
            width: 12px;
            height: 12px;
            border: 2px solid #333333;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.2s;
        }

        /* Efek ketika radio button aktif terpilih */
        .active .radio-dot {
            background-color: #00bcd4; /* Warna biru/hitam saat aktif */
        }

        /* Wadah untuk Sub-Menu (a1, b1) */
        .sub-menu-container {
            display: none; /* Tersembunyi sebelum menu utama diklik */
            background-color: #fdfdfd;
        }

        /* Baris khusus untuk Sub-Menu (Menjorok ke kanan) */
        .sub-menu-container .menu-row {
            padding-left: 45px; /* Menggeser teks ke kanan sesuai sketsa */
            background-color: #fafafa;
            border-bottom: 1px dashed #dddddd;
        }

        /* Memunculkan sub-menu saat kelas 'show' ditambahkan */
        .show {
            display: block;
        }
    </style>
</head>
<body>

<div class="dropdown-box">
    
    <!-- Baris Judul Atas -->
    <div class="menu-row header-pilih">
        <span>Pilih</span>
        <span class="radio-dot" style="opacity: 0.3;"></span>
    </div>

    <!-- MENU KELOMPOK A -->
    <div class="main-menu">
        <div class="menu-row" onclick="toggleMenu('group-a', this)">
            <span class="menu-text">a0</span>
            <span class="radio-dot"></span>
        </div>
        <!-- Sub-menu dari a0 -->
        <div id="group-a" class="sub-menu-container">
            <div class="menu-row sub-item" onclick="selectRadio(this)">
                <span class="menu-text">a1</span>
                <span class="radio-dot"></span>
            </div>
            <div class="menu-row sub-item" onclick="selectRadio(this)">
                <span class="menu-text">b1</span>
                <span class="radio-dot"></span>
            </div>
        </div>
    </div>

    <!-- MENU KELOMPOK B -->
    <div class="main-menu">
        <div class="menu-row" onclick="toggleMenu('group-b', this)">
            <span class="menu-text">b0</span>
            <span class="radio-dot"></span>
        </div>
        <!-- Sub-menu dari b0 -->
        <div id="group-b" class="sub-menu-container">
            <div class="menu-row sub-item" onclick="selectRadio(this)">
                <span class="menu-text">b1</span>
                <span class="radio-dot"></span>
            </div>
        </div>
    </div>

</div>

<!-- JAVASCRIPT UNTUK AKSI BUKA/TUTUP DAN PILIH RADIO -->
<script>
    // Fungsi untuk membuka atau menutup sub-menu
    function toggleMenu(id, element) {
        var subMenu = document.getElementById(id);
        
        // Reset tanda aktif pada menu utama lain terlebih dahulu
        document.querySelectorAll('.menu-row').forEach(row => row.classList.remove('active'));
        
        if (subMenu.classList.contains('show')) {
            subMenu.classList.remove('show');
        } else {
            // Tutup semua sub-menu yang terbuka
            document.querySelectorAll('.sub-menu-container').forEach(menu => menu.classList.remove('show'));
            // Buka sub-menu yang dipilih
            subMenu.classList.add('show');
            element.classList.add('active');
        }
    }

    // Fungsi saat sub-item paling dalam diklik
    function selectRadio(element) {
        // Hapus tanda aktif dari semua sub-item agar tidak ganda
        document.querySelectorAll('.sub-item').forEach(item => item.classList.remove('active'));
        // Aktifkan bulatan radio pada item yang diklik
        element.classList.add('active');
        
        // Menghentikan efek klik agar tidak memicu menu induknya tutup
        event.stopPropagation(); 
    }
</script>

</body>
</html>
