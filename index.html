<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sudut Berpelurus Interaktif & Animasi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        h2 { color: #333; margin-top: 0; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        input[type="range"] {
            width: 100%;
            margin-bottom: 10px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        canvas {
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 15px;
        }
        .info-box {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-weight: bold;
        }
        .text-a { color: #ff3b30; }
        .text-b { color: #007aff; }
        
        /* Gaya Tombol Animasi */
        .btn-animasi {
            width: 100%;
            padding: 10px;
            background-color: #34c759;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-animasi:hover {
            background-color: #2eaf4f;
        }
        .btn-animasi.playing {
            background-color: #ff3b30;
        }
        .btn-animasi.playing:hover {
            background-color: #d6332a;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Sudut Berpelurus</h2>
    <p>Geser nilai secara manual atau jalankan animasi otomatis.</p>

    <!-- Slider Interaktif -->
    <div class="input-group">
        <label for="sliderA">Atur Sudut A:</label>
        <input type="range" id="sliderA" min="0" max="180" value="60" oninput="hentikanAnimasi(); updateSudut(this.value)">
    </div>

    <!-- Input Angka -->
    <div class="input-group">
        <input type="number" id="angkaA" min="0" max="180" value="60" oninput="hentikanAnimasi(); updateSudut(this.value)">
    </div>

    <!-- Tombol Kontrol Animasi -->
    <button id="btnPlay" class="btn-animasi" onclick="toggleAnimasi()">▶ Putar Otomatis</button>

    <!-- Grafik Visual Bergerak -->
    <canvas id="grafikSudut" width="350" height="180"></canvas>

    <!-- Informasi Hasil -->
    <div class="info-box">
        <span class="text-a">Sudut A = <span id="valA">60</span>°</span>
        <span class="text-b">Sudut B = <span id="valB">120</span>°</span>
    </div>
</div>

<script>
const canvas = document.getElementById('grafikSudut');
const ctx = canvas.getContext('2d');
const btnPlay = document.getElementById('btnPlay');

let IDAnimasi = null;
let sedangBerputar = false;
let arahMaju = true; // True berarti sudut bertambah, False berarti berkurang

function updateSudut(nilai) {
    let sudutA = parseFloat(nilai);
    if (isNaN(sudutA)) sudutA = 0;
    if (sudutA < 0) sudutA = 0;
    if (sudutA > 180) sudutA = 180;

    document.getElementById('sliderA').value = sudutA;
    document.getElementById('angkaA').value = sudutA;

    const sudutB = 180 - sudutA;

    document.getElementById('valA').innerText = Math.round(sudutA);
    document.getElementById('valB').innerText = Math.round(sudutB);

    gambarGrafik(sudutA);
}

function gambarGrafik(sudutA) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const centerX = canvas.width / 2;
    const centerY = canvas.height - 30;
    const radius = 120;

    // 1. Garis Lurus Horizontal (180 derajat)
    ctx.beginPath();
    ctx.moveTo(centerX - radius - 20, centerY);
    ctx.lineTo(centerX + radius + 20, centerY);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.stroke();

    const radian = (sudutA * Math.PI) / 180;
    const targetX = centerX + radius * Math.cos(-radian);
    const targetY = centerY + radius * Math.sin(-radian);

    // 2. Garis Pembagi Sudut
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(targetX, targetY);
    ctx.strokeStyle = '#34c759';
    ctx.lineWidth = 4;
    ctx.stroke();

    // 3. Busur Sudut A (Kanan)
    if (sudutA > 0) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, 40, 0, -radian, true);
        ctx.strokeStyle = '#ff3b30';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    // 4. Busur Sudut B (Kiri)
    if (sudutA < 180) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, 50, -radian, -Math.PI, true);
        ctx.strokeStyle = '#007aff';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    // 5. Titik Pusat
    ctx.beginPath();
    ctx.arc(centerX, centerY, 6, 0, 2 * Math.PI);
    ctx.fillStyle = '#333';
    ctx.fill();
}

// FUNGSI ANIMASI BARU
function animasiLoop() {
    let currentVal = parseFloat(document.getElementById('sliderA').value);

    // Efek bolak-balik (ping-pong) saat mentok di 0 atau 180
    if (arahMaju) {
        currentVal += 0.8; // Kecepatan putaran (bisa diubah)
        if (currentVal >= 180) {
            currentVal = 180;
            arahMaju = false;
        }
    } else {
        currentVal -= 0.8;
        if (currentVal <= 0) {
            currentVal = 0;
            arahMaju = true;
        }
    }

    updateSudut(currentVal);
    IDAnimasi = requestAnimationFrame(animasiLoop);
}

function toggleAnimasi() {
    if (sedangBerputar) {
        hentikanAnimasi();
    } else {
        sedangBerputar = true;
        btnPlay.innerText = "⏸ Pause Animasi";
        btnPlay.classList.add('playing');
        animasiLoop();
    }
}

function hentikanAnimasi() {
    sedangBerputar = false;
    btnPlay.innerText = "▶ Putar Otomatis";
    btnPlay.classList.remove('playing');
    cancelAnimationFrame(IDAnimasi);
}

// Inisialisasi awal
gambarGrafik(60);
</script>

</body>
</html>
