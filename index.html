
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sudut Multi-Style</title>
    <style>
        * {
            box-sizing: border-box;
            0;
            padding: 0;
            'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        /* Desain Kotak Utama ala Kalkulator Multi */
        .calculator-box {
            background: #22252d;
            width: 380px;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        /* Layar Display Utama */
        .screen-display {
            background: #292d36;
            border-radius: 20px;
            padding: 20px;
        }
        /* Desain Kotak Utama ala Kalkulator Multi */
        .calculator-box {
            background: #22252d;
            width: 380px;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        /* Layar Display Utama */
        .screen-display {
            background: #292d36;
            border-radius: 20px;
            padding: 15px;
            20px;
            text-align: right;
        }
        .screen-title {
            color: #4caf50;
            font-size: 14px;
            text-align: left;
            5px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .main-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 32px;
            text-align: right;
            font-weight: bold;
            outline: none;
            padding-bottom: 5px;
        }
        
        /* Slider section */
        .slider-container {
            15px 0;
            padding: 0 5px;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 5px;
            outline: none;
        }
 
        /* Grafik Visual Canvas */
        canvas {
            background: #292d36;
            border-radius: 20px;
            20px;
            width: 100%;
            display: block;
        }
 
        /* Desain Grid Tombol Keypad */
        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .btn {
            border: none;
            outline: none;
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        /* Pembagian Warna Tombol Khusus */
        .btn-number {
            background-color: #292d36;
            color: #ffffff;
        }
        .btn-number:active { background-color: #373e4a; }
        
        .btn-func {
            background-color: #273c3a;
            color: #4caf50;
        }
        .btn-func:active { background-color: #1e524d; }
 
        .btn-operator {
            background-color: #ff9500;
            color: white;
        }
        .btn-operator:active { background-color: #e08400; }
 
        .btn-clear {
            background-color: #f44336;
            color: white;
        }
        .btn-clear:active { background-color:
            #d32f2f; }
 
        /* Hasil Info di bagian bawah */
        .info-panel {
            grid-column: span 4;
            background: #292d36;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 14px;
            5px;
        }
        .info-panel span strong { font-size: 16px; }
        .color-a { color: #ff4757; }
        .color-b { color: #2ed573; }
    </style>
</head>
<body>
 
<div class="calculator-box">
    <div class="screen-display">
        <div class="screen-title">Sudut A + Sudut B = 180°</div>
        <input type="text" id="angkaA" value="60" readonly class="main-input">
    </div>

       <!-- Grafik Visual Sudut -->
    <canvas id="grafikSudut" width="340" height="150"></canvas>
 
    <div class="slider-container">
        <input type="range" id="sliderA" min="0" max="180" value="60" oninput="hentikanAnimasi(); updateSudut(this.value)">
    </div>
 
    <!-- Tata Letak Tombol Grid Persis Gaya Kalkulator Multi -->
    <div class="keypad-grid">
        <!-- Baris 1 -->
        <button class="btn btn-clear" onclick="tekanKeypad('C')">C</button>
        <button class="btn btn-func" onclick="tekanKeypad('⌫')">⌫</button>
        <button class="btn btn-func" onclick="updateSudut(90)">90°</button>
        <button id="btnPlay" class="btn btn-operator" onclick="toggleAnimasi()">▶</button>
        
        <!-- Baris 2 -->
        <button class="btn btn-number" onclick="tekanKeypad('7')">7</button>
        <button class="btn btn-number" onclick="tekanKeypad('8')">8</button>
        <button class="btn btn-number" onclick="tekanKeypad('9')">9</button>
        <button class="btn btn-func" onclick="updateSudut(180)">180°</button>
        
        <!-- Baris 3 -->
        <button class="btn btn-number" onclick="tekanKeypad('4')">4</button>
        <button class="btn btn-number" onclick="tekanKeypad('5')">5</button>
        <button class="btn btn-number" onclick="tekanKeypad('6')">6</button>
        <button class="btn btn-func" onclick="updateSudut(45)">45°</button>

            <!-- Baris 4 -->
        <button class="btn btn-number" onclick="tekanKeypad('1')">1</button>
        <button class="btn btn-number" onclick="tekanKeypad('2')">2</button>
        <button class="btn btn-number" onclick="tekanKeypad('3')">3</button>
        <button class="btn btn-number" onclick="tekanKeypad('0')">0</button>
 
        <!-- Baris Info Hasil Terintegrasi -->
        <div class="info-panel">
            <span class="color-a">Sudut A: <strong id="valA">60</strong>°</span>
            <span class="color-b">Sudut B: <strong id="valB">120</strong>°</span>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('grafikSudut');
const ctx = canvas.getContext('2d');
const btnPlay = document.getElementById('btnPlay');
const inputAngka = document.getElementById('angkaA');
 
let IDAnimasi = null;
let sedangBerputar = false;
let arahMaju = true;
 
function tekanKeypad(karakter) {
    hentikanAnimasi();
    let teksSekarang = inputAngka.value;
 
    if (karakter === 'C') {
        teksSekarang = '0';
    } else if (karakter === '⌫') {
        teksSekarang = teksSekarang.slice(0, -1);
        if (teksSekarang === '') teksSekarang = '0';
    } else {
        if (teksSekarang === '0') {
            teksSekarang = karakter;
        } else {
            teksSekarang += karakter;
        }
    }
 
    if (parseFloat(teksSekarang) > 180) {
        teksSekarang = '180';
    }
 
    inputAngka.value = teksSekarang;
    updateSudut(teksSekarang);
}
 
function updateSudut(nilai) {
    let sudutA = parseFloat(nilai);
    if (isNaN(sudutA)) sudutA = 0;
    if (sudutA < 0) sudutA = 0;
    if (sudutA > 180) sudutA = 180;
 
    document.getElementById('sliderA').value = sudutA;
    inputAngka.value = Math.round(sudutA);
 
    document.getElementById('valA').innerText = Math.round(sudutA);
    document.getElementById('valB').innerText = Math.round(180 - sudutA);
 
    gambarGrafik(sudutA);
}
 
function gambarGrafik(sudutA) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const centerX = canvas.width / 2;
    const centerY = canvas.height - 20;
    const radius = 100;
 
    // Garis Dasar
    ctx.beginPath();
    ctx.moveTo(centerX - radius - 20, centerY);
    ctx.lineTo(centerX + radius + 20, centerY);
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 4;
    ctx.stroke();
 
    const radian = (sudutA * Math.PI) / 180;
    const targetX = centerX + radius * Math.cos(-radian);
    const targetY = centerY + radius * Math.sin(-radian);
    
 
    // Garis Pembagi
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(targetX, targetY);
    ctx.strokeStyle = '#ff9500';
    ctx.lineWidth = 4;
    ctx.stroke();
 
    // Busur Sudut A
    if (sudutA > 0) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, 30, 0, -radian, true);
        ctx.strokeStyle = '#ff4757';
        ctx.lineWidth = 3;
        ctx.stroke();
    }
 
    // Busur Sudut B
    if (sudutA < 180) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, 38, -radian, -Math.PI, true);
        ctx.strokeStyle = '#2ed573';
        ctx.lineWidth = 3;
        ctx.stroke();
    }
}
 
function animasiLoop() {
    let currentVal = parseFloat(document.getElementById('sliderA').value);
    if (arahMaju) {
        currentVal += 1;
        if (currentVal >= 180) { currentVal = 180; arahMaju = false; }
    } else {
        currentVal -= 1;
        if (currentVal <= 0) { currentVal = 0; arahMaju = true; }
    }
    updateSudut(currentVal);
    IDAnimasi =requestAnimationFrame(animasiLoop);
}
 
function toggleAnimasi() {
    if (sedangBerputar) {
        hentikanAnimasi();
    } else {
        sedangBerputar = true;
        btnPlay.innerText = "⏸";
        animasiLoop();
    }
}
 
function hentikanAnimasi() {
    sedangBerputar = false;
    btnPlay.innerText = "▶";
    cancelAnimationFrame(IDAnimasi);
}
 
// Inisialisasi awal
updateSudut(60);
</script>
</body>
</html>
