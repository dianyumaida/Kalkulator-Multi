<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sudut Satu Input Sederhana</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .calculator-box {
            background: #22252d;
            width: 380px;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .header-banner {
            border: 2px solid #373e4a;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            color: #4caf50;
            font-weight: bold;
            font-size: 15px;
            text-transform: uppercase;
            background: #292d36;
            margin-bottom: 20px;
        }
        .sketsa-menu-vertical {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        .menu-step-btn {
            width: 100%;
            background: #292d36;
            color: #ffffff;
            border: 1px solid #373e4a;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .menu-step-btn.active {
            background: #ff9500;
            color: #22252d;
            border-color: #ff9500;
        }
        
        /* Hanya Satu Display Utama */
        .screen-display {
            background: #292d36;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .screen-title {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        /* Kolom Isian Tunggal */
        .single-input {
            width: 80%;
            background: #22252d;
            border: 2px solid #373e4a;
            border-radius: 12px;
            color: #ffffff;
            font-size: 36px;
            text-align: center;
            font-weight: bold;
            outline: none;
            padding: 8px;
            margin: 10px auto;
            display: block;
        }
        .single-input:focus {
            border-color: #ff9500;
        }
        
        /* Box Tempat Menampilkan Hasil */
        .result-panel {
            background: #1e2128;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 18px;
            color: #ffffff;
            font-weight: bold;
            border-left: 5px solid #ff9500;
        }
        .color-highlight {
            color: #4caf50;
            font-size: 22px;
        }
    </style>
</head>
<body>

<div class="calculator-box">
    <!-- Kotak Batas Atas Sesuai Sketsa Gambar -->
    <div class="header-banner">Pilih Aturan Sudut</div>

    <!-- Menu Vertikal Menurun Kebawah -->
    <div class="sketsa-menu-vertical">
        <button class="menu-step-btn active" id="btn-mode-180" onclick="gantiMode(180, 'Berpelurus')">
            <span>A. Sudut Berpelurus</span> <span>180°</span>
        </button>
        <button class="menu-step-btn" id="btn-mode-90" onclick="gantiMode(90, 'Berkomplemen')">
            <span>B. Sudut Berkomplemen</span> <span>90°</span>
        </button>
        <button class="menu-step-btn" id="btn-mode-360" onclick="gantiMode(360, 'Satu Putaran')">
            <span>C. Sudut Satu Putaran</span> <span>360°</span>
        </button>
    </div>

    <!-- Area Input Tunggal dan Hasil -->
    <div class="screen-display">
        <div id="rumusTeks" class="screen-title">Sudut A + Sudut B = 180°</div>
        
        <label style="color: #aaa; font-size: 13px; display:block;">Masukkan Sudut A (°):</label>
        <!-- HANYA SATU KOLOM ISIAN UTAMA -->
        <input type="number" id="inputUtama" value="60" min="0" max="180" class="single-input" oninput="hitungSudut()">

        <div class="result-panel">
            Sudut B = <span id="hasilSudutB" class="color-highlight">120</span>°
        </div>
    </div>
</div>

<script>
let batasMaksimal = 180;

function gantiMode(targetBatas, namaMode) {
    batasMaksimal = targetBatas;
    
    // Switch kelas active tombol vertikal
    document.querySelectorAll('.menu-step-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    document.getElementById(`btn-mode-${targetBatas}`).classList.add('active');

    // Update teks panduan rumus di atas input
    const rumusTeks = document.getElementById('rumusTeks');
    rumusTeks.innerText = `Sudut A + Sudut B = ${batasMaksimal}° (${namaMode})`;

    // Update aturan limit angka di kolom input
    const inputUtama = document.getElementById('inputUtama');
    inputUtama.max = batasMaksimal;
    
    // Reset nilai default biar proporsional saat ganti mode
    if(batasMaksimal === 90) inputUtama.value = 30;
    else if(batasMaksimal === 180) inputUtama.value = 60;
    else if(batasMaksimal === 360) inputUtama.value = 100;

    hitungSudut();
}

// Logika Inti: Satu input diisi langsung keluar hasil sudut pasangannya
function hitungSudut() {
    const inputUtama = document.getElementById('inputUtama');
    let sudutA = parseFloat(inputUtama.value);

    // Proteksi validasi input kosong atau tidak valid
    if (isNaN(sudutA) || inputUtama.value === "") {
        document.getElementById('hasilSudutB').innerText = "-";
        return;
    }

    // Batasi input agar tidak melewati aturan sudut terpilih
    if (sudutA < 0) {
        sudutA = 0;
        inputUtama.value = 0;
    }
    if (sudutA > batasMaksimal) {
        sudutA = batasMaksimal;
        inputUtama.value = batasMaksimal;
    }

    // Rumus Matematika Utama
    const sudutB = batasMaksimal - sudutA;

    // Tampilkan langsung di panel hasil
    document.getElementById('hasilSudutB').innerText = Math.round(sudutB);
}

// Inisialisasi hitungan pertama saat web dimuat
hitungSudut();
</script>

</body>
</html>
