<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Energi & Memo Pilih Data (Export Excel)</title>
    <!-- Library SheetJS untuk Export Excel secara langsung -->
    <script src="https://jsdelivr.net"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f4f4f9;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2, h3 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
        }
        .sub-title {
            text-align: center;
            color: #777;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .flex-layout {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        @media(min-width: 768px) {
            .flex-layout { flex-direction: row; }
            .left-panel { flex: 2; }
            .right-panel { flex: 1; }
        }
        /* Grid Input Kalkulator */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .input-group label {
            font-weight: bold;
            margin-bottom: 6px;
            color: #4a5568;
            font-size: 13px;
        }
        .input-wrapper { display: flex; gap: 4px; }
        .input-wrapper input {
            flex: 1; padding: 8px; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 15px; outline: none;
        }
        .btn-inf {
            padding: 0 10px; background-color: #e2e8f0; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 18px; cursor: pointer;
        }
        .integral-group { background: #fff3cd !important; border-color: #ffeba2 !important; }
        /* Panel Memo / Tabel Pilihan Radio Button Sesuai Gambar */
        .memo-box {
            background: #fff;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
        }
        .memo-title {
            font-weight: bold;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .tree-node { margin-bottom: 8px; }
        .tree-child { margin-left: 25px; margin-top: 4px; }
        .radio-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: #f1f5f9;
            border-radius: 4px;
            margin-bottom: 2px;
        }
        .radio-row label { cursor: pointer; font-weight: bold; flex: 1; }
        /* Tombol Aksi */
        .btn-calc {
            width: 100%; padding: 15px; background-color: #ffc107; color: #212529; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 15px;
        }
        .btn-excel {
            width: 100%; padding: 12px; background-color: #217346; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        /* Tabel Riwayat / Hasil Turun ke Bawah */
        .history-section { margin-top: 25px; border-top: 2px dashed #cbd5e1; padding-top: 20px; }
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator & Memo Pilihan Data</h2>
    <div class="sub-title">Fitur: Pilihan Nilai Radio Button ➔ Masuk Riwayat ➔ Unduh Dokumen Excel</div>

    <div class="flex-layout">
        <!-- PANEL KIRI: Form Input Variabel & Rumus -->
        <div class="left-panel">
            <div class="input-grid">
                <div class="input-group"><label>Variabel a</label><div class="input-wrapper"><input type="text" id="v_a" value="10"><button class="btn-inf" onclick="setInfinity('v_a')">∞</button></div></div>
                <div class="input-group"><label>Variabel b</label><div class="input-wrapper"><input type="text" id="v_b" value="2"><button class="btn-inf" onclick="setInfinity('v_b')">∞</button></div></div>
                <div class="input-group"><label>Variabel c</label><div class="input-wrapper"><input type="text" id="v_c" value="5"><button class="btn-inf" onclick="setInfinity('v_c')">∞</button></div></div>
                <div class="input-group"><label>Variabel d</label><div class="input-wrapper"><input type="text" id="v_d" value="4"><button class="btn-inf" onclick="setInfinity('v_d')">∞</button></div></div>
                <div class="input-group"><label>Jumlah deret (&Sigma; c^n)</label><div class="input-wrapper"><input type="text" id="v_sum" value="25"><button class="btn-inf" onclick="setInfinity('v_sum')">∞</button></div></div>
                <div class="input-group"><label>Konstanta g(a)</label><div class="input-wrapper"><input type="text" id="v_ga" value="1.5"><button class="btn-inf" onclick="setInfinity('v_ga')">∞</button></div></div>
                <div class="input-group"><label>Variabel g</label><div class="input-wrapper"><input type="text" id="v_g" value="8"><button class="btn-inf" onclick="setInfinity('v_g')">∞</button></div></div>
                <div class="input-group"><label>Variabel B</label><div class="input-wrapper"><input type="text" id="v_B" value="3"><button class="btn-inf" onclick="setInfinity('v_B')">∞</button></div></div>
                
                <div class="input-group integral-group"><label>Nilai Integral (∬ dA)</label><div class="input-wrapper"><input type="text" id="v_int" value="4"><button class="btn-inf" onclick="setInfinity('v_int')">∞</button></div></div>
                <div class="input-group integral-group"><label>Pangkat Integral (n)</label><div class="input-wrapper"><input type="text" id="v_pow_n" value="2"><button class="btn-inf" onclick="setInfinity('v_pow_n')">∞</button></div></div>
            </div>
            <button class="btn-calc" onclick="hitungSertaSimpan('Kalkulasi Manual')">= HITUNG ENERGI TOTAL</button>
        </div>

        <!-- PANEL KANAN: Susunan Memo Radio Button Sesuai Gambar Sketsa -->
        <div class="right-panel">
            <div class="memo-box">
                <div class="memo-title"><span>Pilih Tabel / Memo</span> <span>▼</span></div>
                
                <!-- Kelompok A -->
                <div class="tree-node">
                    <div class="radio-row">
                        <label for="r_a0">a0 (Sudut Log)</label>
                        <input type="radio" name="memo_select" id="r_a0" value="a0 (Sudut Log)" onclick="pilihDariMemo('a0', 12, 4)">
                    </div>
                    <div class="tree-child">
                        <div class="radio-row"><label for="r_a1">a1</label><input type="radio" name="memo_select" id="r_a1" value="a1" onclick="pilihDariMemo('a1', 15, 5)"></div>
                        <div class="radio-row"><label for="r_b1">b1</label><input type="radio" name="memo_select" id="r_b1" value="b1" onclick="pilihDariMemo('b1', 8, 3)"></div>
                    </div>
                </div>

                <!-- Kelompok B -->
                <div class="tree-node">
                    <div class="radio-row">
                        <label for="r_b0">b0 (Tabel Sudut)</label>
                        <input type="radio" name="memo_select" id="r_b0" value="b0 (Tabel Sudut)" onclick="pilihDariMemo('b0', 20, 6)">
                    </div>
                    <div class="tree-child">
                        <div class="radio-row"><label for="r_b1_sub">b1</label><input type="radio" name="memo_select" id="r_b1_sub" value="b1_sub" onclick="pilihDariMemo('b1_sub', 14, 2)"></div>
                    </div>
                </div>

                <!-- Kelompok C -->
                <div class="tree-node">
                    <div class="radio-row"><label for="r_c0">c0</label><input type="radio" name="memo_select" id="r_c0" value="c0" onclick="pilihDariMemo('c0', 18, 7)"></div>
                    <div class="tree-child">
                        <div class="radio-row"><label for="r_c1">c1</label><input type="radio" name="memo_select" id="r_c1" value="c1" onclick="pilihDariMemo('c1', 22, 9)"></div>
                    </div>
                </div>
            </div>
            <button class="btn-excel" onclick="unduhExcel()">📥 UNDUH DATA KE EXCEL</button>
        </div>
    </div>

    <!-- TABEL RIWAYAT: Setiap Hasil Baru Ditambahkan Turun Ke Bawah -->
    <div class="history-section">
        <h3>Riwayat Perhitungan (Berurutan ke Bawah)</h3>
        <div class="table-responsive">
            <table id="excelTable">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Keterangan / Memo Terpilih</th>
                        <th>Variabel a</th>
                        <th>Variabel b</th>
                        <th>Variabel c</th>
