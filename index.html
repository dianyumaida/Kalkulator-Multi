
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Pencarian Sudut Bercabang</title>
    <style>
        * {
            box-sizing: border-box;
            0;
            padding: 0;
            'Courier New', Courier, monospace; /* Gaya tulisan mirip ketikan/sketsa */
        }
        body {
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .calculator-container {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border: 2px dashed #333; /* Desain garis putus-putus estetika sketsa */
            border-radius: 15px;
        }
        
        /* Desain Kotak Input Persis seperti Sketsa Gambar Anda */
        .input-box-wrapper {
            text-align: center;
            25px;
        }
        .sketch-input {
            width: 70%;
            padding: 12px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            border: 3px solid #000000; /* Kotak hitam tegas */
            border-radius: 8px;outline: none;
            text-transform: uppercase;
        }
        .sketch-input:focus {
            background-color: #fffde7;
        }
        
        /* Simbol Panah Kebawah Kebawah */
        .arrow-down {
            font-size: 24px;
            font-weight: bold;
            5px 0 15px 25px;
            text-align: left;
            color: #333;
        }
 
        /* Area Tampilan Hasil Bercabang */
        .result-branch-area {
            min-height: 150px;
            padding-left: 10px;
        }
        .branch-group {
            15px;
            font-size: 20px;
            font-weight: bold;
            color: #000;
            1.6;
        }
        .sub-branch {
            padding-left: 40px; /* Membuat teks menjorok ke dalam seperti tangga */
            color: #555;
        }
        
        /* Pesan jika data tidak ditemukan */
        .not-found {
            color: #999;
            font-style: italic;
            font-size: 16px;
        }
    </style>
</head>
<body>

    
<div class="calculator-container">
    
    <!-- Kotak Input Utama (Persis Kotak Atas di Gambar) -->
    <div class="input-box-wrapper">
        <input type="text" id="kotakIsi" placeholder="Isi Kode..." class="single-input sketch-input" oninput="prosesPencarianSudut()">
    </div>
 
    <!-- Simbol Panah Turun Sesuai Sketsa -->
    <div class="arrow-down">⬇</div>
 
    <!-- Tempat Output Hasil Struktur Tangga Kebawah -->
    <div id="outputCabang" class="result-branch-area">
        <!-- Hasil pencarian otomatis muncul di sini -->
    </div>
 
</div>
 
<script>
// DATABASE DATA: Tempat menyimpan data kode dan hasil sudut yang mau dikeluarkan
// Anda bisa menambah, mengubah angka, atau mengganti teks di dalam sini dengan bebas
const databaseSudut = {
    "131": [
        { utama: "= Sudut 30", sub: ["= Sudut 31", "  32"] },
        { utama: "= Sudut 60", sub: ["= Sudut 61", "  62"] }
    ],
    "132": [
        { utama: "= Sudut 40", sub: ["= Sudut 41", "  42"] },
        { utama: "= Sudut 80", sub: ["= Sudut 81", "  82"] }
    ],
    "abc": [
        { utama: "= Sudut 10", sub: ["= Sudut 11"] },
        { utama: "= Sudut 20", sub: ["= Sudut 21"] }
    ]
};
 
function prosesPencarianSudut() {
    const nilaiInput =

    document.getElementById('kotakIsi').value.trim().toLowerCase();
    const areaOutput = document.getElementById('outputCabang');
    
    // Jika kotak isian kosong
    if (nilaiInput === "") {
        areaOutput.innerHTML = '<div class="not-found">Ketik kode (misal: 131) untuk melihat hasil...</div>';
        return;
    }
 
    // Ambil data dari database berdasarkan apa yang diketik
    const dataDitemukan = databaseSudut[nilaiInput];
 
    if (dataDitemukan) {
        let komponenHTML = "";
 
        // Looping untuk membuat struktur cabang bertangga kebawah
        dataDitemukan.forEach(item => {
            komponenHTML += `<div class="branch-group">${item.utama}</div>`;
            
            if (item.sub && item.sub.length > 0) {
                item.sub.forEach(subItem => {
                    komponenHTML += `<div class="branch-group sub-branch">${subItem}</div>`;
                });
            }
        });
 
        areaOutput.innerHTML = komponenHTML;
    } else {
        // Jika kode yang diketik belum
    didaftarkan di database
        areaOutput.innerHTML = '<div class="not-found">= Data tidak ditemukan</div>';
    }
}
 
// Jalankan fungsi sekali saat pertama kali dibuka
prosesPencarianSudut();
</script>
 
</body>
</html>
