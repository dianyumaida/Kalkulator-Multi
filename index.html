<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Multi Folder Sinkron</title>
    <style>
        body { Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f2f5; 0; }
        .kalkulator { width: 360px; background: white; border: 2px solid #000; border-radius: 8px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .layar { border: 2px solid #000; height: 160px; 15px; padding: 10px; box-sizing: border-box; background: #fafafa; font-size: 14px; overflow-y: auto; 1.4; }
        .area-utama { display: flex; gap: 10px; }
        .panel-kiri { width: 120px; background: #e2efe0; border: 1px solid #000; border-radius: 6px; padding: 8px; display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; }
        .btn-menu-anak { background: white; border: 1px solid #000; border-radius: 4px; height: 40px; cursor: pointer; font-size: 11px; width: 100%; text-align: center; }
        .select-rumus-utama { background: white; border: 2px solid red; border-radius: 4px; height: 45px; color: red; font-weight: bold; font-size: 12px; text-align: center; width: 100%; cursor: pointer; text-align-last: center; }
        .panel-kanan { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .grid-angka { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-angka { background: white; border: 1px solid #000; border-radius: 6px; height: 45px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn-hitung { background: #28a745; color: white; border: 1px solid #000; border-radius: 6px; height: 45px; font-size: 14px; cursor: pointer; font-weight: bold; }
        .baris-bawah { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-jingga { background: #ffe3d1; border: 1px solid #000; border-radius: 6px; height: 45px; font-size: 14px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
 
<div class="kalkulator">
    <!-- Layar Utama -->
    <div class="layar" id="layarTampilan">
        <div id="judulMode"><b>Mode: PANJANG</b></div>
        <div id="nilaiInput" style="font-size: 24px; font-weight: bold; 5px; color: #222;">0</div>
        <div id="infoHasil" style=" 5px; color: #555;">Klik tombol &lt; PILIH &gt; merah untuk menentukan jenis rumus.</div>
    </div>
 
    <div class="area-utama">
        <!-- Panel Kiri (Hijau) -->
        <div class="panel-kiri">
            <button class="btn-menu-anak" id="sub1">Meter</button>
            <button class="btn-menu-anak" id="sub2">KM</button>
            <button class="btn-menu-anak" id="sub3">CM</button>
            
            <!-- SELEKTOR RUMUS UTAMA -->
            <select class="select-rumus-utama" id="pilihRumusKontrol">
                <option value="panjang" selected>RUMUS PANJANG</option>
                <option value="kecepatan">RUMUS KECEPATAN</option>
                <option value="angin">RUMUS ANGIN</option>
                <option value="air">RUMUS AIR</option>
            </select>
        </div>
 
        <!-- Panel Kanan (Numpad Grid) -->
        <div class="panel-kanan">
            <div class="grid-angka">
                <button class="btn-angka num" data-val="1">1</button>
                <button class="btn-angka num" data-val="2">2</button>
                <button class="btn-angka num" data-val="3">3</button>
                <button class="btn-angka num" data-val="4">4</button>
                <button class="btn-angka num" data-val="5">5</button>
                <button class="btn-angka num" data-val="6">6</button>
                <button class="btn-angka num" data-val="7">7</button>
                <button class="btn-angka num" data-val="8">8</button>
                <button class="btn-angka num" data-val="9">9</button>
                <button class="btn-hitung" id="mHitung">HITUNG</button>
            </div>
            
            <div class="baris-bawah">
                <button class="btn-angka num" data-val="0">0</button>
                <button class="btn-jingga" id="backBtn">←</button>
            </div>
            <button class="btn-jingga" id="delBtn" style="width: 100%;">DELETE</button>
        </div>
    </div>
</div>
 
<!-- SINKRONISASI 4 JALUR FOLDER BERBEDA SESUAI PERMINTAAN -->
<script type="module">
    import { hitungPanjang } from './Folder/panjang.js';
    import { hitungKecepatan } from './Folder/kecepatan.js';
    import { hitungAngin } from './Folder/angin.js';
    import { hitungAir } from './Folder/air.js';
 
    let kategoriAktif = 'panjang';
    let subAktif = 0; 
    let inputSekarang = '0';
    let dataKecepatan = { jarak: 0, waktu: 1 };
 
    const labelSub = {
        panjang: ['Meter', 'KM', 'CM'],
        kecepatan: ['Jarak (m)', 'Waktu (s)', 'Siap Hitung'],
        angin: ['m/s', 'km/jam', '-'],
        air: ['m/s', 'km/jam', '-']
    };
 
    const opsiUnit = {
        panjang: ['m', 'km', 'cm'],
        kecepatan: ['m', 'km', 'cm'],
        angin: ['ms', 'kmh', 'ms'],
        air: ['ms', 'kmh', 'ms']
    };
 
    document.getElementById('pilihRumusKontrol').addEventListener('change', (e) => {
        kategoriAktif = e.target.value;
        subAktif = 0;
        inputSekarang = '0';
        document.getElementById('nilaiInput').innerText = '0';
        
        document.getElementById('sub1').innerText = labelSub[kategoriAktif];
        document.getElementById('sub2').innerText = labelSub[kategoriAktif];
        document.getElementById('sub3').innerText = labelSub[kategoriAktif];
        
        document.getElementById('judulMode').innerHTML = `<b>Mode: ${kategoriAktif.toUpperCase()}</b>`;
        document.getElementById('infoHasil').innerHTML = `Rumus aktif: ${kategoriAktif.toUpperCase()}. Masukkan angka dan tekan HITUNG.`;
    });
 
    document.getElementById('sub1').addEventListener('click', () => { subAktif = 0; inputSekarang = '0'; document.getElementById('nilaiInput').innerText = '0'; document.getElementById('infoHasil').innerHTML = `Unit aktif: <b>${labelSub[kategoriAktif][0]}</b>`; });
    document.getElementById('sub2').addEventListener('click', () => { subAktif = 1; inputSekarang = '0'; document.getElementById('nilaiInput').innerText = '0'; document.getElementById('infoHasil').innerHTML = `Unit aktif: <b>${labelSub[kategoriAktif][1]}</b>`; });
    document.getElementById('sub3').addEventListener('click', () => { subAktif = 2; inputSekarang = '0'; document.getElementById('nilaiInput').innerText = '0'; document.getElementById('infoHasil').innerHTML = `Unit aktif: <b>${labelSub[kategoriAktif][2]}</b>`; });
 
    document.querySelectorAll('.num').forEach(btn => {
        btn.addEventListener('click', (e) => {
            let val = e.target.getAttribute('data-val');
            if (inputSekarang === '0') inputSekarang = val;
            else inputSekarang += val;
            document.getElementById('nilaiInput').innerText = inputSekarang;
        });
    });
 
    document.getElementById('backBtn').addEventListener('click', () => {
        if (inputSekarang.length > 1) inputSekarang = inputSekarang.slice(0, -1);
        else inputSekarang = '0';
        document.getElementById('nilaiInput').innerText = inputSekarang;
    });
 
    document.getElementById('mHitung').addEventListener('click', () => {
        const nilai = parseFloat(inputSekarang);
        if (isNaN(nilai)) return;
 
        let hasilHTML = "";
        const unitAsal = opsiUnit[kategoriAktif][subAktif];
 
        if (kategoriAktif === 'panjang') {
            const hasil = hitungPanjang(nilai, unitAsal);
            hasilHTML = `• ${hasil.m.toFixed(1)} m<br>• ${hasil.km.toFixed(4)} km<br>• ${hasil.cm.toFixed(0)} cm`;
        } 
        else if (kategoriAktif === 'kecepatan') {
            if (subAktif === 0) {
                dataKecepatan.jarak = nilai;
                document.getElementById('infoHasil').innerHTML = "Jarak disimpan! Klik tombol unit ke-2 (Waktu (s)) di kiri lalu isi angka waktu.";
                inputSekarang = '0';
                document.getElementById('nilaiInput').innerText = '0';
                return;
            } else {
                dataKecepatan.waktu = nilai || 1;
                const hasil = hitungKecepatan(dataKecepatan.jarak, dataKecepatan.waktu);
                hasilHTML = `• s: ${dataKecepatan.jarak} m, t: ${dataKecepatan.waktu} s<br>• v: <b>${hasil.ms.toFixed(2)} m/s</b><br>• v: <b>${hasil.kmh.toFixed(2)} km/jam</b>`;
            }
        } 
        else if (kategoriAktif === 'angin') {
            const hasil = hitungAngin(nilai, unitAsal);
            hasilHTML = `• v: ${nilai} ${unitAsal}<br>• <b>${hasil.pa.toFixed(2)} Pa</b><br>• <b>${(hasil.pa/100000).toFixed(5)} Bar</b>`;
        } 
        else if (kategoriAktif === 'air') {
            const hasil = hitungAir(nilai, unitAsal);
            hasilHTML = `• v: ${nilai} ${unitAsal}<br>• <b>${hasil.pa.toFixed(2)} Pa</b><br>• <b>${(hasil.pa/100000).toFixed(4)} Bar</b>`;
        }
 
        document.getElementById('infoHasil').innerHTML = hasilHTML;
    });
 
    document.getElementById('delBtn').addEventListener('click', () => {
        inputSekarang = '0';
        dataKecepatan = { jarak: 0, waktu: 1 };
        document.getElementById('nilaiInput').innerText = '0';
        document.getElementById('infoHasil').innerHTML = 'Data input dikosongkan.';
    });
</script>
</body>
</html>
