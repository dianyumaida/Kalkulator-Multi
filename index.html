<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Tombol Fisik Multirumus</title>
    <style>
        body { Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f2f5; 0; }
        .kalkulator { width: 360px; background: white; border: 2px solid #000; border-radius: 8px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Layar Atas */
        .layar { border: 2px solid #000; height: 180px; 15px; padding: 10px; box-sizing: border-box; background: #fafafa; font-size: 14px; overflow-y: auto; 1.4; }
        
        /* Baris Tombol Menu Atas (Pink) */
        .menu-atas { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 15px; }
        .btn-pink { background: #ffe3d1; border: 1px solid #000; border-radius: 6px; height: 35px; cursor: pointer; font-size: 11px; font-weight: bold; }
        
        /* Area Konten Utama */
        .area-utama { display: flex; gap: 10px; }
        
        /* Panel Kiri (Hijau) */
        .panel-kiri { width: 100px; background: #e2efe0; border: 1px solid #000; border-radius: 6px; padding: 8px; display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; }
        .btn-menu-anak { background: white; border: 1px solid #000; border-radius: 4px; height: 35px; cursor: pointer; font-size: 11px; }
        .btn-pilih { color: red; font-weight: bold; }
        
        /* Panel Kanan (Grid Angka/Numpad) */
        .panel-kanan { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .grid-angka { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-angka { background: white; border: 1px solid #000; border-radius: 6px; height: 45px; font-size: 18px; cursor: pointer; font-weight: bold; }
        
        /* Baris Tombol Bawah */
        .baris-bawah { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-jingga { background: #ffe3d1; border: 1px solid #000; border-radius: 6px; height: 45px; font-size: 14px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
 
<div class="kalkulator">
    <!-- Layar Utama -->
    <div class="layar" id="layarTampilan">
        <div><b>Mode: Panjang</b></div>
        <div id="nilaiInput" style="font-size: 24px; font-weight: bold; 10px; color: #222;">0</div>
        <div id="infoHasil" style=" 10px; color: #555;">Hasil konversi akan muncul di sini.</div>
    </div>
 
    <!-- 5 Tombol Kategori Atas -->
    <div class="menu-atas">
        <button class="btn-pink" onclick="setKategori('panjang')">PANJANG</button>
        <button class="btn-pink" onclick="setKategori('kecepatan')">KEC.</button>
        <button class="btn-pink" onclick="setKategori('angin')">ANGIN</button>
        <button class="btn-pink" onclick="setKategori('air')">AIR</button>
        <button class="btn-pink" onclick="bukaRiwayat()">RIWAYAT</button>
    </div>
 
    <div class="area-utama">
        <!-- Panel Kiri (Sub-Menu Pilihan Anak) -->
        <div class="panel-kiri">
            <button class="btn-menu-anak" id="sub1" onclick="setSub(0)">Meter</button>
            <button class="btn-menu-anak" id="sub2" onclick="setSub(1)">KM</button>
            <button class="btn-menu-anak" id="sub3" onclick="setSub(2)">CM</button>
            <button class="btn-menu-anak btn-pilih" onclick="prosesHitung()">&lt; PILIH &gt;</button>
        </div>
 
        <!-- Panel Kanan (Input Angka & Aksi) -->
        <div class="panel-kanan">
            <div class="grid-angka">
                <button class="btn-angka" onclick="tekanAngka('1')">1</button>
                <button class="btn-angka" onclick="tekanAngka('2')">2</button>
                <button class="btn-angka" onclick="tekanAngka('3')">3</button>
                <button class="btn-angka" onclick="tekanAngka('4')">4</button>
                <button class="btn-angka" onclick="tekanAngka('5')">5</button>
                <button class="btn-angka" onclick="tekanAngka('6')">6</button>
                <button class="btn-angka" onclick="tekanAngka('7')">7</button>
                <button class="btn-angka" onclick="tekanAngka('8')">8</button>
                <button class="btn-angka" onclick="tekanAngka('9')">9</button>
                <button class="btn-angka" onclick="tekanAngka('0')">0</button>
            </div>
            
            <div class="baris-bawah">
                <button class="btn-jingga" onclick="backspace()">←</button>
                <button class="btn-jingga" onclick="hapusSemua()">DELETE</button>
            </div>
        </div>
    </div>
</div>
 
<script>
    let kategoriAktif = 'panjang';
    let subAktif = 0; 
    let inputSekarang = '0';
    let riwayatData = [];
 
    const labelSub = {
        panjang: ['Dari Meter', 'Dari KM', 'Dari CM'],
        kecepatan: ['Jarak (m)', 'Waktu (s)', 'Hitung v'],
        angin: ['m/s', 'km/jam', '-'],
        air: ['m/s', 'km/jam', '-']
    };
 
    let dataKecepatan = { jarak: 0, waktu: 1 };
 
    function setKategori(kat) {
        kategoriAktif = kat;
        subAktif = 0;
        inputSekarang = '0';
        document.getElementById('nilaiInput').innerText = '0';
        
        // Update teks tombol sub-menu anak di panel hijau
        document.getElementById('sub1').innerText = labelSub[kat][0];
        document.getElementById('sub2').innerText = labelSub[kat][1];
        document.getElementById('sub3').innerText = labelSub[kat][2];
        
        perbaruiLayar(`<b>Mode: ${kat.toUpperCase()}</b><br>Silakan masukkan nilai angka.`);
    }
 
    function setSub(indeks) {
        subAktif = indeks;
        if (kategoriAktif === 'kecepatan') {
            if (indeks === 2) {
                prosesHitung();
            } else {
                perbaruiLayar(`Masukkan nilai untuk: <b>${labelSub.kecepatan[indeks]}</b>`);
                inputSekarang = '0';
                document.getElementById('nilaiInput').innerText = '0';
            }
        } else {
            perbaruiLayar(`Pilihan sub-menu aktif: <b>${labelSub[kategoriAktif][indeks]}</b>`);
        }
    }
 
    function tekanAngka(angka) {
        if (inputSekarang === '0') {
            inputSekarang = angka;
        } else {
            inputSekarang += angka;
        }
        document.getElementById('nilaiInput').innerText = inputSekarang;
    }
 
    function backspace() {
        if (inputSekarang.length > 1) {
            inputSekarang = inputSekarang.slice(0, -1);
        } else {
            inputSekarang = '0';
        }
        document.getElementById('nilaiInput').innerText = inputSekarang;
    }
 
    function hapusSemua() {
        inputSekarang = '0';
        dataKecepatan = { jarak: 0, waktu: 1 };
        document.getElementById('nilaiInput').innerText = '0';
        document.getElementById('infoHasil').innerHTML = 'Data dibersihkan.';
    }
 
    function prosesHitung() {
        const nilai = parseFloat(inputSekarang);
        let hasilTeks = "";
 
        if (kategoriAktif === 'panjang') {
            let m = nilai;
            if (subAktif === 1) m = nilai * 1000; // dari KM
            if (subAktif === 2) m = nilai / 100;  // dari CM
            hasilTeks = `• M: ${(m).toFixed(1)} m<br>• KM: ${(m/1000).toFixed(4)} km<br>• CM: ${(m*100).toFixed(0)} cm`;
            riwayatData.push(`[PANJANG] ${nilai} -> ${m}m`);
        } 
        else if (kategoriAktif === 'kecepatan') {
            if (subAktif === 0) {
                dataKecepatan.jarak = nilai;
                hasilTeks = `Jarak disimpan: ${nilai} m. Klik sub-menu 'Waktu' untuk input waktu tempuh.`;
            } else if (subAktif === 1) {
                dataKecepatan.waktu = nilai || 1;
                hasilTeks = `Waktu disimpan: ${nilai} s. Klik tombol <b>&lt; PILIH &gt;</b> untuk hasil v.`;
            } else {
                let v = dataKecepatan.jarak / dataKecepatan.waktu;
                hasilTeks = `• v: <b>${v.toFixed(2)} m/s</b><br>• v: <b>${(v*3.6).toFixed(2)} km/jam</b>`;
                riwayatData.push(`[KEC] s:${dataKecepatan.jarak}m t:${dataKecepatan.waktu}s -> v:${v.toFixed(2)}m/s`);
            }
        } 
        else if (kategoriAktif === 'angin') {
            let ms = nilai;
            if (subAktif === 1) ms = nilai / 3.6; // dari kmh
            let p = 0.6 * Math.pow(ms, 2);
            hasilTeks = `• Tekanan Angin:<br><b>${p.toFixed(2)} Pascal (Pa)</b>`;
            riwayatData.push(`[ANGIN] v:${nilai} -> P:${p.toFixed(1)}Pa`);
        } 
        else if (kategoriAktif === 'air') {
            let ms = nilai;
            if (subAktif === 1) ms = nilai / 3.6; // dari kmh
            let p = 500 * Math.pow(ms, 2);
            hasilTeks = `• Tekanan Air:<br><b>${p.toFixed(2)} Pascal (Pa)</b>`;
            riwayatData.push(`[AIR] v:${nilai} -> P:${p.toFixed(1)}Pa`);
        }
 
        document.getElementById('infoHasil').innerHTML = hasilTeks;
    }
 
    function bukaRiwayat() {
        if (riwayatData.length === 0) {
            document.getElementById('infoHasil').innerHTML = "Belum ada data riwayat kalkulasi.";
        } else {
            let htmlList = "<b>Riwayat Terkini:</b><br>";
            riwayatData.slice(-4).forEach(item => {
                htmlList += `• ${item}<br>`;
            });
            document.getElementById('infoHasil').innerHTML = htmlList;
        }
    }
 
    function perbaruiLayar(teks) {
        document.getElementById('infoHasil').innerHTML = teks;
    }
</script>
 
</body>
</html>
