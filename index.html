<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Multi Fungsi</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: white;
            --text-color: #333;
            --border-color: #ccc;
            --result-bg: #e9ecef;
        }
        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f4f6f9;
            --border-color: #444;
            --result-bg: #2a2a2a;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; transition: background 0.3s, color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; }
        h2 { text-align: center; margin-top: 0; }
        .theme-toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; background: none; border: none; font-size: 20px; width: auto; padding: 0; margin: 0; }
        select, input, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border-color); font-size: 16px; background: var(--card-bg); color: var(--text-color); }
        select:focus, input:focus, textarea:focus { border-color: #007bff; outline: none; }
        button { background-color: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        textarea { resize: vertical; min-height: 100px; font-family: inherit; }
        .kalkulator-section { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .result { background: var(--result-bg); padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; text-align: center; }
        .note { font-size: 12px; color: #888; }
        .history-section { margin-top: 20px; padding-top: 15px; border-top: 2px dashed var(--border-color); }
        .history-list { padding-left: 20px; font-size: 14px; max-height: 120px; overflow-y: auto; }
        .history-list li { margin-bottom: 5px; }
        .status-saved { font-size: 12px; color: #28a745; display: none; margin-top: 4px; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <h2>🧮 Kalkulator Multi</h2>
    
    <label for="menu">Pilih Menu:</label>
    <select id="menu" onchange="tampilkanKalkulator()">
        <option value="">-- Pilih --</option>
        <option value="kotak">Luas & Keliling Kotak</option>
        <option value="segitiga">Luas Segitiga</option>
        <option value="bola">Volume & Luas Bola</option>
        <option value="tekanan">Konversi Beban (kg) ke PSI</option>
        <option value="catatan">📝 Catatan / Memo Rumus</option>
    </select>

    <!-- KOTAK -->
    <div id="sec-kotak" class="kalkulator-section">
        <h3>Kalkulator Kotak (Persegi)</h3>
        <input type="number" id="sisi" placeholder="Masukkan panjang sisi (cm)">
        <button onclick="hitungKotak()">Hitung</button>
        <div id="res-kotak" class="result" style="display:none;"></div>
    </div>

    <!-- SEGITIGA -->
    <div id="sec-segitiga" class="kalkulator-section">
        <h3>Kalkulator Segitiga</h3>
        <input type="number" id="alas" placeholder="Masukkan alas (cm)">
        <input type="number" id="tinggi" placeholder="Masukkan tinggi (cm)">
        <button onclick="hitungSegitiga()">Hitung</button>
        <div id="res-segitiga" class="result" style="display:none;"></div>
    </div>

    <!-- BOLA -->
    <div id="sec-bola" class="kalkulator-section">
        <h3>Kalkulator Bola</h3>
        <input type="number" id="jari" placeholder="Masukkan jari-jari (cm)">
        <button onclick="hitungBola()">Hitung</button>
        <div id="res-bola" class="result" style="display:none;"></div>
    </div>

    <!-- TEKANAN -->
    <div id="sec-tekanan" class="kalkulator-section">
        <h3>Konversi Beban ke PSI</h3>
        <input type="number" id="beban" placeholder="Masukkan beban (kg)">
        <input type="number" id="luasArea" placeholder="Masukkan luas permukaan (cm²)">
        <p class="note">*Catatan: Tekanan butuh nilai luas area permukaan tekanan (cm²).</p>
        <button onclick="hitungPSI()">Hitung PSI</button>
        <div id="res-tekanan" class="result" style="display:none;"></div>
    </div>

    <!-- CATATAN -->
    <div id="sec-catatan" class="kalkulator-section">
        <h3>📝 Catatan & Memo</h3>
        <textarea id="memoText" placeholder="Tulis rumus penting atau catatan Anda di sini..."></textarea>
        <button onclick="simpanCatatan()">Simpan Catatan</button>
        <div id="statusSaved" class="status-saved">✓ Catatan berhasil disimpan!</div>
    </div>

    <!-- RIWAYAT -->
    <div class="history-section">
        <h4>📜 Riwayat Perhitungan</h4>
        <ul id="historyList" class="history-list">
            <li style="list-style:none; color:#888;">Belum ada riwayat.</li>
        </ul>
    </div>
</div>

<script>
    // Ambil catatan yang tersimpan saat halaman dimuat
    window.onload = function() {
        if(localStorage.getItem("memoKalkulator")) {
            document.getElementById("memoText").value = localStorage.getItem("memoKalkulator");
        }
    };

    function toggleTheme() {
        const body = document.documentElement;
        const btn = document.getElementById("themeBtn");
        if (body.getAttribute("data-theme") === "dark") {
            body.removeAttribute("data-theme");
            btn.innerText = "🌙";
        } else {
            body.setAttribute("data-theme", "dark");
            btn.innerText = "☀️";
        }
    }

    function tampilkanKalkulator() {
        let menu = document.getElementById("menu").value;
        let sections = document.querySelectorAll(".kalkulator-section");
        sections.forEach(sec => sec.style.display = "none");
        if(menu) {
            document.getElementById("sec-" + menu).style.display = "block";
        }
    }

    function simpanCatatan() {
        let teks = document.getElementById("memoText").value;
        localStorage.setItem("memoKalkulator", teks);
        
        let status = document.getElementById("statusSaved");
        status.style.display = "block";
        setTimeout(() => { status.style.display = "none"; }, 2000);
    }

    function tambahRiwayat(teks) {
        let list = document.getElementById("historyList");
        if(list.innerText.includes("Belum ada riwayat")) {
            list.innerHTML = "";
        }
        let li = document.createElement("li");
        li.innerHTML = teks;
        list.insertBefore(li, list.firstChild);
    }

    function hitungKotak() {
        let s = parseFloat(document.getElementById("sisi").value);
        if(!s) return alert("Masukkan angka yang valid");
        let luas = s * s;
        let keliling = 4 * s;
        tampilkanHasil("res-kotak", `Luas: ${luas} cm² <br> Keliling: ${keliling} cm`);
        tambahRiwayat(`Kotak (sisi ${s}cm) &rarr; L: ${luas}cm², K: ${keliling}cm`);
    }

    function hitungSegitiga() {
        let a = parseFloat(document.getElementById("alas").value);
        let t = parseFloat(document.getElementById("tinggi").value);
        if(!a || !t) return alert("Masukkan angka yang valid");
        let luas = 0.5 * a * t;
        tampilkanHasil("res-segitiga", `Luas: ${luas} cm²`);
        tambahRiwayat(`Segitiga (a:${a}, t:${t}) &rarr; L: ${luas}cm²`);
    }

    function hitungBola() {
        let r = parseFloat(document.getElementById("jari").value);
        if(!r) return alert("Masukkan angka yang valid");
        let volume = (4/3) * Math.PI * Math.pow(r, 3);
        let luasPermukaan = 4 * Math.PI * Math.pow(r, 2);
        tampilkanHasil("res-bola", `Volume: ${volume.toFixed(2)} cm³ <br> Luas Permukaan: ${luasPermukaan.toFixed(2)} cm²`);
        tambahRiwayat(`Bola (r ${r}cm) &rarr; V: ${volume.toFixed(1)}cm³, LP: ${luasPermukaan.toFixed(1)}cm²`);
    }

    function hitungPSI() {
        let kg = parseFloat(document.getElementById("beban").value);
        let area = parseFloat(document.getElementById("luasArea").value);
        if(!kg || !area) return alert("Masukkan angka yang valid");
        let psi = (kg / area) * 14.2233;
        tampilkanHasil("res-tekanan", `Tekanan: ${psi.toFixed(2)} PSI`);
        tambahRiwayat(`Konversi ${kg}kg / ${area}cm² &rarr; ${psi.toFixed(1)} PSI`);
    }

    function tampilkanHasil(id, teks) {
        let el = document.getElementById(id);
        el.innerHTML = teks;
        el.style.display = "block";
    }
</script>

</body>
</html>
